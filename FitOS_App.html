// ADDICTION TRACKER
// ═══════════════════════════════════════════════════════════════════════════
const ADDICTION_META = {
  'emotional-eating': {label:'Emotional Eating',icon:'🍕',replace:['5-min walk when craving hits','Drink a full glass of water first','Journal what you\'re feeling','Call a mate instead of the fridge']},
  'smoking':          {label:'Smoking',icon:'🚬',replace:['4-7-8 breathing (inhale 4, hold 7, out 8)','Chew sugar-free gum','Do 10 push-ups — craving passes in 3 min','Sip cold water slowly']},
  'weed':             {label:'Weed',icon:'🌿',replace:['Hit the gym — dopamine without the fog','Journal your thoughts instead of numbing them','5-min meditation (try Wim Hof breathing)','Call someone you trust']},
  'alcohol':          {label:'Alcohol',icon:'🍺',replace:['Sparkling water with lime — same ritual, zero damage','Gym session — best buzz is earned','Reach out to a support group or mate','Cold shower — sharpens everything']},
  'vaping':           {label:'Vaping',icon:'💨',replace:['Box breathing: 4 in, 4 hold, 4 out, 4 hold','Chew sugar-free gum or sip water','Do a set of push-ups or burpees','Delay 10 minutes — craving usually passes']},
  'aclass':           {label:'A-Class Substances',icon:'💊',replace:['Professional support is key — consider a counsellor','Intense exercise burns the same neural pathways cleanly','Journal: what is this actually filling?','Connect with someone safe — isolation fuels it']},
  'porn':             {label:'Porn',icon:'📵',replace:['Cold shower — immediate pattern interrupt','Exercise hard for 20 minutes','Journal what triggered the urge','Block it at router/app level — remove friction to stay clean']}
};

function getAddictionState(id){
  const d = S.addictionData[id] || {streak:0,bestStreak:0,lastClean:null,slipDate:null,triggers:[],loggedToday:false};
  const today = new Date().toISOString().slice(0,10);
  // auto-detect if they logged yesterday (streak continuity)
  if(d.lastClean && d.lastClean !== today){
    const last = new Date(d.lastClean);
    const now = new Date(today);
    const diffDays = Math.round((now - last) / 86400000);
    if(diffDays > 1 && d.loggedToday){
      // they missed a day — but only reset if they haven't logged today
      d.streak = 0;
    }
    d.loggedToday = false;
  }
  return d;
}

function renderAddictions(){
  const addictions = S.profile.addictions || [];
  if(!addictions.length) return '';
  const today = new Date().toISOString().slice(0,10);
  return `
  <div class="card-title" style="margin-top:20px">🔥 Elimination Tracker</div>
  <div style="font-size:0.78rem;color:var(--muted);margin-bottom:12px">Private. No judgement. Just momentum.</div>
  ${addictions.map(id=>{
    const meta = ADDICTION_META[id];
    if(!meta) return '';
    const d = getAddictionState(id);
    const loggedToday = d.loggedToday;
    const streak = d.streak||0;
    const best = d.bestStreak||0;
    const tip = meta.replace[streak % meta.replace.length];
    return `<div class="step-card" style="margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="font-size:1.8rem">${meta.icon}</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:0.95rem">${meta.label}</div>
          <div style="font-size:0.78rem;color:var(--muted)">${streak>0?streak+' day'+( streak!==1?'s':'')+' clean 💪':'Start your streak today'}${best>streak&&best>0?' · Best: '+best+'d':''}</div>
        </div>
        ${streak>=7?`<div style="background:var(--green);color:#000;font-size:0.7rem;font-weight:700;padding:3px 8px;border-radius:20px">🏆 ${streak}d</div>`:''}
      </div>
      ${streak>0?`<div class="step-progress-wrap" style="margin-bottom:10px"><div class="step-progress-fill" style="width:${Math.min(100,Math.round(streak/30*100))}%;background:var(--green)"></div></div>`:''}
      <div style="background:var(--s2);border-radius:8px;padding:10px;margin-bottom:10px;font-size:0.8rem;color:var(--muted)">
        <span style="color:var(--amber);font-weight:600">💡 Replacement: </span>${tip}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <button onclick="logAddictionClean('${id}')" ${loggedToday?'disabled style="opacity:0.5"':''} style="background:${loggedToday?'var(--s2)':'var(--green)'};color:${loggedToday?'var(--muted)':'#000'};border:none;border-radius:10px;padding:10px;font-weight:700;font-size:0.82rem;cursor:${loggedToday?'default':'pointer'}">${loggedToday?'✅ Logged today':'✅ Stayed Clean'}</button>
        <button onclick="logAddictionSlip('${id}')" style="background:var(--s2);color:var(--red);border:1px solid var(--red);border-radius:10px;padding:10px;font-weight:600;font-size:0.82rem;cursor:pointer">I Slipped</button>
      </div>
      <div style="display:flex;gap:8px">
        <input id="trigger-${id}" type="text" placeholder="What triggered it? (optional)" style="flex:1;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:0.8rem;color:var(--text)"/>
        <button onclick="saveAddictionTrigger('${id}')" style="background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:0.8rem;font-weight:600;cursor:pointer">Log</button>
      </div>
      ${d.triggers&&d.triggers.length>0?`<div style="margin-top:8px;font-size:0.75rem;color:var(--muted)">Last trigger: "${d.triggers[d.triggers.length-1].text}" — ${d.triggers[d.triggers.length-1].date}</div>`:''}
    </div>`;
  }).join('')}`;
}

function logAddictionClean(id){
  const today = new Date().toISOString().slice(0,10);
  const d = S.addictionData[id] || {streak:0,bestStreak:0,lastClean:null,slipDate:null,triggers:[],loggedToday:false};
  if(d.loggedToday) return;
  if(d.lastClean){
    const last = new Date(d.lastClean);
    const now = new Date(today);
    const diff = Math.round((now - last) / 86400000);
    d.streak = diff===1 ? (d.streak||0)+1 : 1;
  } else {
    d.streak = 1;
  }
  d.lastClean = today;
  d.loggedToday = true;
  d.bestStreak = Math.max(d.bestStreak||0, d.streak);
  S.addictionData[id] = d;
  localStorage.setItem('fitos_addiction_data', JSON.stringify(S.addictionData));
  render();
}

function logAddictionSlip(id){
  const today = new Date().toISOString().slice(0,10);
  const d = S.addictionData[id] || {streak:0,bestStreak:0,lastClean:null,slipDate:null,triggers:[],loggedToday:false};
  const prev = d.streak||0;
  d.bestStreak = Math.max(d.bestStreak||0, prev);
  d.streak = 0;
  d.slipDate = today;
  d.loggedToday = false;
  S.addictionData[id] = d;
  localStorage.setItem('fitos_addiction_data', JSON.stringify(S.addictionData));
  // Compassionate prompt
  setTimeout(()=>alert('Hey — slipping doesn\'t erase the work you\'ve done. It\'s one data point. Tomorrow\'s streak starts now. You\'ve got this. 💪'), 50);
  render();
}

function saveAddictionTrigger(id){
  const inp = document.getElementById('trigger-'+id);
  if(!inp||!inp.value.trim()) return;
  const today = new Date().toISOString().slice(0,10);
  const d = S.addictionData[id] || {streak:0,bestStreak:0,lastClean:null,slipDate:null,triggers:[],loggedToday:false};
  if(!d.triggers) d.triggers=[];
  d.triggers.push({date:today,text:inp.value.trim()});
  if(d.triggers.length>10) d.triggers=d.triggers.slice(-10);
  S.addictionData[id] = d;
  localStorage.setItem('fitos_addiction_data', JSON.stringify(S.addictionData));
  inp.value='';
  render();
}

async function doFoodSearch(type){
  if(type==='popular'){
    S.foodResults=[
      {name:'Chicken Breast (cooked)',brand:'Generic',cal:165,p:31,c:0,f:4},
      {name:'White Rice (cooked)',brand:'Generic',cal:130,p:3,c:28,f:0},
      {name:'Rolled Oats (dry)',brand:'Generic',cal:375,p:13,c:62,f:7},
      {name:'Eggs (whole)',brand:'Generic',cal:143,p:13,c:1,f:10},
      {name:'Greek Yoghurt (full fat)',brand:'Generic',cal:97,p:9,c:4,f:5},
      {name:'Banana',brand:'Generic',cal:89,p:1,c:23,f:0},
      {name:'Almonds (raw)',brand:'Generic',cal:579,p:21,c:22,f:50},
      {name:'Sweet Potato (cooked)',brand:'Generic',cal:90,p:2,c:21,f:0},
      {name:'Salmon (cooked)',brand:'Generic',cal:208,p:28,c:0,f:10},
      {name:'Beef Mince (90% lean, cooked)',brand:'Generic',cal:215,p:26,c:0,f:12},
      {name:'Broccoli (steamed)',brand:'Generic',cal:35,p:3,c:7,f:0},
      {name:'Whey Protein Powder',brand:'Generic',cal:380,p:76,c:8,f:6},
    ];
    render();return;
  }
  const q=S.foodQuery.trim();
  if(!q)return;
  S.foodSearching=true;render();
  // Check if it's a barcode (all digits)
  if(/^\d{8,14}$/.test(q)){
    try{
      const r=await fetch('https://world.openfoodfacts.org/api/v2/product/'+q+'.json');
      const d=await r.json();
      if(d.status===1&&d.product){
        const pr=d.product;
        const n=pr.nutriments;
        S.foodResults=[{
          name:pr.product_name||pr.abbreviated_product_name||'Unknown Product',
          brand:pr.brands||'',
          cal:Math.round(n['energy-kcal_100g']||0),
          p:Math.round(n['proteins_100g']||0),
          c:Math.round(n['carbohydrates_100g']||0),
          f:Math.round(n['fat_100g']||0)
        }];
      } else {S.foodResults=[];}
    }catch{S.foodResults=[];}
    S.foodSearching=false;render();return;
  }
  // Text search
  try{
    const url='https://world.openfoodfacts.org/cgi/search.pl?search_terms='+encodeURIComponent(q)+'&search_simple=1&action=process&json=1&page_size=8&fields=product_name,brands,nutriments';
    const r=await fetch(url);
    const d=await r.json();
    S.foodResults=(d.products||[]).filter(p=>p.product_name&&p.nutriments&&p.nutriments['energy-kcal_100g']).slice(0,6).map(p=>({
      name:p.product_name,
      brand:p.brands||'',
      cal:Math.round(p.nutriments['energy-kcal_100g']||0),
      p:Math.round(p.nutriments['proteins_100g']||0),
      c:Math.round(p.nutriments['carbohydrates_100g']||0),
      f:Math.round(p.nutriments['fat_100g']||0)
    }));
  }catch{S.foodResults=[];}
  S.foodSearching=false;render();
}

function startBarcodeInput(){
  // Real camera barcode scanner
  if(!('BarcodeDetector' in window)){
    // Fallback for older browsers — manual entry
    var code=prompt('Camera scanning not supported on this browser.\nEnter barcode number:');
    if(code&&code.trim()){S.foodQuery=code.trim();doFoodSearch();}
    return;
  }
  // Build scanner overlay
  var overlay=document.createElement('div');
  overlay.id='barcode-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center';
  overlay.innerHTML='<div style="color:#fff;font-size:1rem;font-weight:700;margin-bottom:16px;letter-spacing:.05em">SCAN BARCODE</div>'+
    '<div style="position:relative;width:280px;height:280px;border-radius:16px;overflow:hidden;background:#111">'+
      '<video id="bc-video" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover"></video>'+
      '<div style="position:absolute;inset:0;border:3px solid #1D9E75;border-radius:16px;pointer-events:none"></div>'+
      '<div id="bc-status" style="position:absolute;bottom:8px;left:0;right:0;text-align:center;color:#1D9E75;font-size:0.78rem;font-weight:600">Searching...</div>'+
    '</div>'+
    '<button id="bc-cancel" style="margin-top:24px;background:none;border:1px solid #555;border-radius:12px;color:#fff;padding:12px 28px;font-size:0.95rem;cursor:pointer">Cancel</button>';
  document.body.appendChild(overlay);
  var stream=null;
  var detector=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128','code_39','qr_code']});
  var scanning=true;
  function stopScanner(){
    scanning=false;
    if(stream) stream.getTracks().forEach(function(t){t.stop();});
    if(overlay.parentNode) overlay.parentNode.removeChild(overlay);
  }
  document.getElementById('bc-cancel').onclick=stopScanner;
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false})
    .then(function(s){
      stream=s;
      var video=document.getElementById('bc-video');
      video.srcObject=s;
      video.play();
      function scan(){
        if(!scanning) return;
        detector.detect(video).then(function(barcodes){
          if(barcodes.length>0){
            var code=barcodes[0].rawValue;
            stopScanner();
            S.foodQuery=code;
            doFoodSearch();
          } else {
            if(scanning) requestAnimationFrame(scan);
          }
        }).catch(function(){if(scanning) requestAnimationFrame(scan);});
      }
      video.onloadedmetadata=function(){scan();};
    })
    .catch(function(err){
      stopScanner();
      var code=prompt('Camera access denied.\nEnter barcode number manually:');
      if(code&&code.trim()){S.foodQuery=code.trim();doFoodSearch();}
    });
}

function confirmAddFood(){
  if(!S.pendingFood)return;
  const f=S.pendingFood;
  const qty=f.servingQty||100;
  const scale=qty/100;
  S.foodLog.push({
    id:Date.now().toString(),
    date:todayStr(),
    name:f.name,
    brand:f.brand||'',
    qty,
    cal:Math.round(f.cal*scale),
    p:Math.round(f.p*scale),
    c:Math.round(f.c*scale),
    f:Math.round(f.f*scale)
  });
  saveDailyState();
  S.showFoodPanel=false;S.pendingFood=null;S.foodResults=[];
  render();
}

}

    '═══════════════════════════════════'
  ].filter(function(l){return l!==undefined&&l!==null;}).join('\n');
  S.checkinDispatch=dispatch;
  // Save snapshot to history (keep last 16 weeks)
  if(c.bodyWeight){
    var snap={week:weekNum,date:new Date().toISOString().slice(0,10),weight:parseFloat(c.bodyWeight),waist:parseFloat(c.waist)||null,prs:c.prs,energy:c.energy,sleep:c.sleepHrs};
    S.checkinHistory=S.checkinHistory.filter(function(h){return h.week!==weekNum;});
    S.checkinHistory.push(snap);
    S.checkinHistory.sort(function(a,b){return a.week-b.week;});
    if(S.checkinHistory.length>16) S.checkinHistory=S.checkinHistory.slice(-16);
    localStorage.setItem('fitos_checkin_history',JSON.stringify(S.checkinHistory));
    // Auto-advance week counter if this is a new week
    if(weekNum>=S.week) S.week=weekNum+1;
    localStorage.setItem('fitos_week',S.week);
  }
  localStorage.setItem('fitos_checkin_draft',JSON.stringify(c));
  render();
  setTimeout(function(){var el=document.getElementById('dispatch-checkin');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},120);
}

      '<div style="font-size:0.82rem;color:#ddd;line-height:1.6">Full access. No credit card. No catch.<br>Your AI PT is activated and ready.</div>'+

    '<div style="margin-top:14px;font-size:0.72rem;color:var(--muted)">Free for 4 months &middot; $19.99 AUD/mo after</div>'
  :
    // GREEN — SUBSCRIPTION
    '<div style="font-size:0.78rem;text-transform:uppercase;letter-spacing:.14em;color:var(--green);margin-bottom:12px;font-weight:700">Already In The Zone</div>'+
    '<div style="font-size:2rem;font-weight:900;line-height:1.2;margin-bottom:16px">'+name+',<br>you\'re already<br>performing.</div>'+
    '<div style="font-size:0.9rem;color:var(--muted);line-height:1.8;max-width:280px;margin:0 auto 28px">Your base is solid. Now let\'s get surgical about training and nutrition to push to the next level.</div>'+
    '<div style="background:rgba(29,158,117,.12);border:1px solid rgba(29,158,117,.4);border-radius:16px;padding:20px;width:100%;max-width:320px;margin-bottom:28px">'+
      '<div style="font-size:2rem;margin-bottom:8px">&#x26A1;</div>'+
      '<div style="font-size:1.2rem;font-weight:800;color:var(--green);margin-bottom:6px">AI PT Activated</div>'+
      '<div style="font-size:0.82rem;color:#ddd;line-height:1.6">$19.99 AUD/month &middot; Cancel anytime.<br>Results guaranteed.</div>'+
    '</div>'+
    '<button class="btn btn-green" style="width:100%;max-width:320px;padding:16px;font-size:1.05rem" onclick="closeGleam()">Start Training &#x2192;</button>'

// ─── CHECK-IN HANDLERS ────────────────────────────────────────────────────
function openCheckin(){S.checkinDispatch='';S.showCheckin=true;render();window.scrollTo(0,0);}
function closeCheckin(){S.showCheckin=false;render();}
function setCheckinPhoto(field,file){
  if(!file)return;
  var r=new FileReader();
  r.onload=function(e){S.checkin[field]=e.target.result;render();};
  r.readAsDataURL(file);
}
function copyCheckinDispatch(){
  var el=document.getElementById('dispatch-checkin');
  if(!el)return;
  navigator.clipboard.writeText(el.textContent).then(function(){alert('Dispatch copied! Paste into Claude.ai for your week review.');}).catch(function(){});
}

// ═══════════════════════════════════════════════════════════════════════════
// ACTION HANDLERS — NAVIGATION
// ═══════════════════════════════════════════════════════════════════════════
function switchTab(id){S.tab=id;render();window.scrollTo(0,0);}

// ─── TRAIN ───────────────────────────────────────────────────────────────
function selectDay(d){S.day=d;S.exIdx=0;S.editingSet=null;S.loggedSets={};render();}
function startWorkout(){S.trainScreen='warmup';S.warmupChecked=new Set();S.workoutStart=Date.now();render();}

function goToWarmup(){
  if(!S.day){alert('Select a training day first.');return;}
  S.trainScreen='warmup';
  S.warmupChecked=new Set();
  S.workoutStart=Date.now();
  render();
  window.scrollTo(0,0);
}

function goTrainHome(){
  S.trainScreen='home';
  S.editingSet=null;
  clearInterval(S.restInterval);
  S.restInterval=null;
  render();
  window.scrollTo(0,0);
}

function openRestDay(type){
  S.restDayType=type;
  S.trainScreen='restday';
  S.restDayChecked=new Set();
  render();
  window.scrollTo(0,0);
}

function switchRestDay(type){
  S.restDayType=type;
  S.restDayChecked=new Set();
  render();
}

function toggleWarmup(id){
  if(S.warmupChecked.has(id)) S.warmupChecked.delete(id);
  else S.warmupChecked.add(id);
  render();
}

function toggleCooldown(id){
  if(S.cooldownChecked.has(id)) S.cooldownChecked.delete(id);
  else S.cooldownChecked.add(id);
  render();
}

function copyDispatch(){
  var txt=document.getElementById('dispatch-text');
  if(!txt) return;
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt.innerText||txt.textContent).then(()=>alert('Dispatch copied! Paste it to Claude.')).catch(()=>{});
  } else {
    var r=document.createRange();r.selectNode(txt);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(r);
    document.execCommand('copy');
    window.getSelection().removeAllRanges();
    alert('Dispatch copied!');
  }
}

function addManualSteps(){
  var inp=document.getElementById('step-manual');
  if(!inp) return;
  var n=parseInt(inp.value)||0;
  if(n>0){
    S.stepsToday+=n;
    localStorage.setItem('fitos_steps',S.stepsToday);
    inp.value='';
    render();
  }
}

function skipWarmup(){S.trainScreen='workout';render();}
function logSet(i){
  var ex=curEx();
  var wEl=document.getElementById('w-'+i);
  var rEl=document.getElementById('r-'+i);
  var kg=parseFloat(wEl&&wEl.value)||0;
  var reps=parseInt(rEl&&rEl.value)||0;
  if(!S.loggedSets[ex.id]) S.loggedSets[ex.id]=[];
  if(S.editingSet&&S.editingSet.exId===ex.id&&S.editingSet.idx===i){
    S.loggedSets[ex.id][i]={weight:kg,reps:reps};
    S.editingSet=null;
  } else {
    S.loggedSets[ex.id].push({weight:kg,reps:reps});
  }
  saveLog();
  startRest(ex.rest||90);
  render();
}
function editSet(exId,idx){S.editingSet={exId:exId,idx:idx};render();}
function deleteSet(exId,idx){
  if(!S.loggedSets[exId])return;
  S.loggedSets[exId].splice(idx,1);
  saveLog();render();
}
function saveLog(){
  localStorage.setItem('fitos_logged',JSON.stringify(S.loggedSets));
  localStorage.setItem('fitos_train_state',JSON.stringify({week:S.week,day:S.day,exIdx:S.exIdx,workoutStart:S.workoutStart}));
}
function endWorkout(){
  if(confirm('Finish workout early? Your logged sets will be saved.')){completeWorkout();}
}
function skipRest(){stopRest();render();}
function selectWeek(w){S.week=w;render();}
function finishAndSave(){completeWorkout();}
function nextEx(){
  var exs=WK[S.day].exercises;
  if(S.exIdx<exs.length-1){S.exIdx++;S.editingSet=null;render();window.scrollTo(0,0);}
}
function prevEx(){if(S.exIdx>0){S.exIdx--;S.editingSet=null;render();window.scrollTo(0,0);}}
function completeWorkout(){
  var sets=S.loggedSets;
  var mins=S.workoutStart?Math.round((Date.now()-S.workoutStart)/60000):0;
  S.gymHistory.push({date:new Date().toISOString(),day:S.day,week:S.week,sets:JSON.parse(JSON.stringify(sets)),duration:mins});
  if(S.gymHistory.length>50) S.gymHistory=S.gymHistory.slice(-50);
  localStorage.setItem('fitos_gym_history',JSON.stringify(S.gymHistory));
  S.trainScreen='complete';S.loggedSets={};
  render();
}
function startRest(secs){
  if(S.restInterval) clearInterval(S.restInterval);
  S.restLeft=secs||90;S.restTotal=secs||90;
  S.restInterval=setInterval(tickRest,1000);
}
function stopRest(){clearInterval(S.restInterval);S.restInterval=null;S.restLeft=0;render();}
function tickRest(){
  S.restLeft--;
  var el=document.getElementById('rest-left');
  var bar=document.getElementById('rest-bar');
  if(el) el.textContent=S.restLeft;
  if(bar) bar.style.width=pct(S.restLeft,S.restTotal)+'%';
  if(S.restLeft<=0){
    clearInterval(S.restInterval);S.restInterval=null;
    try{
      var a=new AudioContext();var o=a.createOscillator();var g=a.createGain();
      o.connect(g);g.connect(a.destination);
      o.frequency.value=880;
      g.gain.setValueAtTime(0.4,a.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.8);
      o.start();o.stop(a.currentTime+0.8);
    }catch(e){}
    render();
  }
}

// ─── EAT ─────────────────────────────────────────────────────────────────


function resetApp(){
  if(!confirm('Clear all your FitOS data and start fresh? This cannot be undone.')) return;
  var keys=Object.keys(localStorage).filter(k=>k.startsWith('fitos'));
  keys.forEach(k=>localStorage.removeItem(k));
  location.reload();
}

function toggleArr(field,val){
  var arr=S.profile[field];
  if(!arr) arr=S.profile[field]=[];
  var idx=arr.indexOf(val);
  if(idx===-1) arr.push(val);
  else arr.splice(idx,1);
  render();
}

function selectAllEquipment(){
  S.profile.equipment=['barbells','dumbbells','cables','machines','hacksquat','smith','legpress','pendulum','sled','kettlebells','bands','pullup','trx','ghd','trapbar'];
  render();
}
function toggleMeal(id){S.expandedMeal=S.expandedMeal===id?null:id;render();}
function logWater(idx){
  S.waterDone=idx<S.waterDone?idx:idx+1;
  localStorage.setItem('fitos_water',S.waterDone);
  render();
}

// ─── SHOP ────────────────────────────────────────────────────────────────
function toggleShop(key){
  if(S.shopTicked.has(key)) S.shopTicked.delete(key);
  else S.shopTicked.add(key);
  localStorage.setItem('fitos_shop',[...S.shopTicked].join('|'));
  render();
}
function clearShop(){S.shopTicked.clear();localStorage.setItem('fitos_shop','');render();}

// ─── HABITS ──────────────────────────────────────────────────────────────
function toggleHabit(id){
  if(S.habitsChecked.has(id)) S.habitsChecked.delete(id);
  else S.habitsChecked.add(id);
  localStorage.setItem('fitos_habits',[...S.habitsChecked].join(','));
  render();
}
function stepUp(){S.stepsToday+=500;localStorage.setItem('fitos_steps',S.stepsToday);render();}

// ─── CHECKIN ─────────────────────────────────────────────────────────────

// ─── INTAKE WIZARD ───────────────────────────────────────────────────────
function wizNext(){
  if(S.intakeStep<INTAKE_STEPS.length-1){S.intakeStep++;render();}
  else{
    try{saveProfile();}catch(e){}
    try{localStorage.setItem('fitos_steps_goal',S.stepsGoal);}catch(e){}
    S.showIntake=false;
    try{generateAndSaveBlock();}catch(e){}
    var bf=parseFloat(S.profile.bodyFatPct);
    var gender=S.profile.gender;
    if(bf>0){
      var isOver=(gender==='male'&&bf>35)||(gender==='female'&&bf>42);
      S.gleamBF=bf;S.gleamResult=isOver?'red':'green';S.showGleam=true;
    }
    render();
  }
}
function wizBack(){if(S.intakeStep>0){S.intakeStep--;render();}}

// ─── STEP PERMISSION ─────────────────────────────────────────────────────
function requestSteps(){
  if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
    DeviceMotionEvent.requestPermission().then(function(r){
      if(r==='granted'){window.addEventListener('devicemotion',onMotion);S.stepTrackingActive=true;render();}
    }).catch(function(){});
  } else {
    window.addEventListener('devicemotion',onMotion);S.stepTrackingActive=true;render();
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════
function initApp(){
  // Load saved personalised block (overwrites default WK if present)
  try{
    var savedBlock=localStorage.getItem('fitos_generated_block');
    if(savedBlock){
      var block=JSON.parse(savedBlock);
      Object.assign(WK,block);
    }
  }catch(e){}
  checkDayReset();
  render();
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
}
function closeGleam(){S.showGleam=false;try{saveProfile();}catch(e){}render();}

function checkMeal(id){
  if(S.mealChecked.has(id)) S.mealChecked.delete(id);
  else S.mealChecked.add(id);
  saveMeal(); render();
}
function saveDailyState(){
  localStorage.setItem('fitos_foodlog',JSON.stringify(S.foodLog));
  localStorage.setItem('fitos_meals',[...S.mealChecked].join(','));
}

initApp();
