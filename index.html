function removeSplash(){
  var _pl=document.getElementById('pre-load');
  if(!_pl) return;
  _pl.style.transition='opacity 0.3s';
  _pl.style.opacity='0';
  setTimeout(function(){if(_pl.parentNode)_pl.parentNode.removeChild(_pl);},350);
}
function initApp(){
  // onerror FIRST — catches any crash in render() and shows it on screen
  window.onerror=function(msg,src,line,col,err){
    removeSplash();
    var el=document.getElementById('screen');
    if(el){
      el.innerHTML='<div style="padding:40px 24px;text-align:center;color:#fff">'
        +'<div style="font-size:2rem;margin-bottom:12px">⚠️</div>'
        +'<div style="font-size:0.95rem;font-weight:700;margin-bottom:8px">App crashed on load</div>'
        +'<div style="font-size:0.75rem;color:#aaa;margin-bottom:6px;word-break:break-all">'+msg+'</div>'
        +'<div style="font-size:0.7rem;color:#666;margin-bottom:24px">Line '+line+' Col '+col+'</div>'
        +'<button onclick="location.reload()" style="background:#1D9E75;border:none;border-radius:12px;padding:14px 32px;font-weight:700;font-size:1rem;color:#fff;cursor:pointer">Reload App</button></div>';
    }
    return false;
  };
  // Nuclear fallback — loading screen ALWAYS removed within 3s no matter what
  setTimeout(removeSplash, 3000);
  // Load saved personalised block (overwrites default WK if present)
  try{
    var savedBlock=localStorage.getItem('fitos_generated_block');
    if(savedBlock){
      var block=JSON.parse(savedBlock);
      ['A','B','C','D','E','F'].forEach(function(k){delete WK[k];});
      Object.assign(WK,block);
    }
  }catch(e){}
  checkDayReset();
  try{render();}catch(renderErr){
    window.onerror(renderErr.message,'render',0,0,renderErr);
  }
  // Remove splash after render (smooth, fast)
  setTimeout(removeSplash, 800);
  window.APP_VERSION='v96';
  // Keyboard avoidance — shrinks food panel above iOS/Android keyboard
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize',function(){
      var panel=document.querySelector('.food-panel');
      if(!panel)return;
      var vvh=window.visualViewport.height;
      var vvTop=window.visualViewport.offsetTop||0;
      panel.style.maxHeight=Math.round(vvh*0.97)+'px';
      var overlay=document.querySelector('.food-panel-overlay');
      if(overlay){overlay.style.height=vvh+'px';overlay.style.top=vvTop+'px';}
      setTimeout(function(){
        var inp=document.querySelector('.food-search-input');
        if(inp)inp.scrollIntoView({block:'nearest',behavior:'smooth'});
      },100);
    });
  }
// Springy button press feedback
  document.addEventListener('touchstart',function(e){
    var btn=e.target.closest('.btn,.log-btn,.btn-green,.coach-send,.tab-orb-btn,.day-btn,.check-item,.habit-item,.tab-item,.adherence-btn,.rating-btn,.edit-btn,.food-scan-btn,.rest-btn-extend,.rest-btn-skip,.step-btn,.swap-ex-btn,.woolies-btn,.food-result-item,.food-memory-item,.shop-item,.hist-item,.done-btn');
    if(btn&&!btn.classList.contains('btn-springing')){
      btn.classList.add('btn-springing');
      btn.addEventListener('animationend',function(){btn.classList.remove('btn-springing');},{once:true});
    }
  },{passive:true});
  // Register SW — caches app shell, auto-updates on close+reopen
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(function(reg){
    reg.addEventListener('updatefound',function(){
      var nw=reg.installing;
      nw.addEventListener('statechange',function(){
        if(nw.state==='installed'&&navigator.serviceWorker.controller){
          console.log('[FitOS] New version cached, ready on next open');
        }
      });
    });
  }).catch(function(){});
  var _refreshed=false;
  navigator.serviceWorker.addEventListener('controllerchange',function(){
    if(!_refreshed){_refreshed=true;location.reload();}
  });
}
}

}

function getCoachEmoji(){return S.profile.coachGender==='female'?'👩':'🧑';}

function buildCoachContext(){
  var p=S.profile||{};
  var t=calcTDEE?calcTDEE():{tdee:2400,targetCal:2000,proteinG:180};
  var style=p.coachStyle||'mate';
  var styleDesc=style==='drill'?'You are a tough-love military-style PT. Direct, no excuses, zero softness. Push them hard.':
    style==='science'?'You are a science-based evidence-first coach. Reference studies. Be precise and calm.':
    'You are a casual Australian personal trainer — warm, funny, real talk, encouraging but zero BS. Use Aussie slang occasionally. Call them champ/mate/legend when it fits.';

  // Today's nutrition
  var todayLog=S.foodLog?S.foodLog.filter(function(f){return f.date===todayStr();}):[];
  var calToday=todayLog.reduce(function(a,f){return a+f.cal;},0);
  var protToday=todayLog.reduce(function(a,f){return a+(f.p||0);},0);

  // This week's performance
  var today=new Date(); var weekSessions=0; var weekCalTotal=0; var weekDays=0;
  for(var i=6;i>=0;i--){
    var d=new Date(today); d.setDate(d.getDate()-i);
    var dd=getDateData(d.toDateString());
    if(dd.cal>0){weekCalTotal+=dd.cal;weekDays++;}
    if(dd.workout) weekSessions++;
  }
  var avgCalWeek=weekDays>0?Math.round(weekCalTotal/weekDays):0;

  // Current block info
  var block=S.currentBlock;
  var blockName=block?(block.goal||'custom block'):'no block yet';
  var blockDays=block&&block.days?block.days.length:0;

  // Recent gym history (last 3 sessions)
  var recentSessions=(S.gymHistory||[]).slice(-3).map(function(h){
    var vol=Object.values(h.sets||{}).reduce(function(a,sets){return a+sets.reduce(function(b,s){return b+(s.weight||0)*(s.reps||0);},0);},0);
    return 'Day '+h.day+' W'+h.week+' ('+new Date(h.date).toLocaleDateString('en-AU',{weekday:'short'})+') — '+Math.round(vol)+'kg total volume';
  }).join('; ')||'none yet';

  // Progression highlights — top lifts
  var topLifts='';
  if(S.gymHistory&&S.gymHistory.length>0){
    var bests={};
    S.gymHistory.forEach(function(h){
      Object.entries(h.sets||{}).forEach(function(e){
        var exName=e[0]; var sets=e[1];
        sets.forEach(function(s){
          if(!bests[exName]||s.weight>bests[exName]) bests[exName]=s.weight;
        });
      });
    });
    topLifts=Object.entries(bests).slice(0,5).map(function(e){return e[0]+': '+e[1]+'kg';}).join(', ')||'none recorded';
  }

  // PAR-Q flags
  var parqYes=['parq1','parq2','parq3','parq4','parq5','parq6','parq7'].filter(function(k){return p[k]==='yes';});

  // Currently doing exercise
  var ex=null;try{ex=curEx&&curEx();}catch(e){}

  var ctx='You are '+getCoachName()+', an AI personal trainer inside FitOS. '+styleDesc+'\n\n'+
    'ATHLETE PROFILE:\n'+
    '- Name: '+(p.name||'Athlete')+' | Age: '+(p.age||'?')+' | Gender: '+(p.gender||'male')+'\n'+
    '- Weight: '+(p.weight||'?')+'kg | Height: '+(p.height||'?')+'cm | BF%: '+(p.bodyFatPct||'?')+'%\n'+
    '- Goal: '+(p.goal||'body recomp')+' | Experience: '+(p.experience||'intermediate')+'\n'+
    '- Training: '+(p.daysPerWeek||4)+' days/week | '+(p.sessionLength||60)+'min sessions | '+(p.gymType||'commercial gym')+'\n'+
    '- TDEE: '+t.tdee+' cal | Target: '+t.targetCal+' cal | Protein target: '+t.proteinG+'g | Fat: '+t.fatG+'g | Carbs: '+t.carbG+'g\n'+
    (p.injuries&&p.injuries.length?'- INJURIES (IMPORTANT — always modify accordingly): '+p.injuries.join(', ')+'\n':'')+
    (parqYes.length?'- PAR-Q flags (medical — be careful, suggest doctor where relevant): PAR-Q '+parqYes.join(', ')+' answered YES\n':'')+
    (p.dietStyle&&p.dietStyle.length?'- Diet: '+p.dietStyle.join(', ')+'\n':'')+
    (p.allergies&&p.allergies.length?'- Allergies: '+p.allergies.join(', ')+'\n':'')+
    (p.addictions&&p.addictions.length?'- Elimination goals: '+p.addictions.join(', ')+'\n':'')+
    '\nCURRENT PROGRAM:\n'+
    '- Block: '+blockName+' ('+blockDays+' training days)\n'+
    '- Current week: '+(S.week||1)+' of 8\n'+
    '- Streak: '+S.streak+' days\n'+
    '\nTHIS WEEK:\n'+
    '- Sessions completed: '+weekSessions+'\n'+
    '- Avg daily calories: '+avgCalWeek+' / '+t.targetCal+' target\n'+
    '- Recent sessions: '+recentSessions+'\n'+
    '- Top lifts logged: '+topLifts+'\n'+
    '\nTODAY:\n'+
    '- Calories: '+calToday+' / '+t.targetCal+'\n'+
    '- Protein: '+protToday+'g / '+t.proteinG+'g\n'+
    '- Water: '+(S.waterDone*0.25).toFixed(1)+'L\n'+
    '- Habits done: '+(S.habitsChecked?[...S.habitsChecked].length:0)+'\n'+
    (ex?'- Currently mid-workout doing: '+ex.name+' | Coach cue: '+ex.cue+'\n':'')+
    '\nRESPONSE RULES: Be concise — 2–4 sentences unless detail is asked for. Use their first name '+(p.name?'('+p.name+') ':'')+' occasionally. Never recommend exercises that conflict with their listed injuries. If they ask about something medical, give fitness guidance but recommend they consult a professional.';

  return ctx;
}

async function sendCoachMessage(){
  var input=document.getElementById('coach-input-field');
  if(!input) return;
  var msg=input.value.trim();
  if(!msg) return;
  input.value='';S.coachInput='';

  // Add user message
  S.coachMessages.push({role:'user',content:msg,ts:Date.now()});
  S.coachTyping=true;
  refreshCoach();
  setTimeout(function(){var el=document.getElementById('coach-msgs');if(el)el.scrollTop=el.scrollHeight;},50);

  try{
    var msgs=S.coachMessages.slice(-10).map(function(m){return{role:m.role,content:m.content};});
    var resp=await fetch(FITOS_WORKER_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:300,system:buildCoachSystemPrompt(),messages:msgs})
    });
    var data=await resp.json();
    S.coachTyping=false;
    if(data.content&&data.content[0]){
      S.coachMessages.push({role:'assistant',content:data.content[0].text,ts:Date.now()});
    } else if(data.error){
      S.coachMessages.push({role:'assistant',content:'API error: '+data.error.message,ts:Date.now()});
    }
  }catch(err){
    S.coachTyping=false;
    S.coachMessages.push({role:'assistant',content:'Connection error. Check your internet and try again.',ts:Date.now()});
  }
  saveCoachHistory();refreshCoach();
  setTimeout(function(){var el=document.getElementById('coach-msgs');if(el)el.scrollTop=el.scrollHeight;},80);
}

function saveCoachHistory(){
  // Keep last 40 messages
  if(S.coachMessages.length>40) S.coachMessages=S.coachMessages.slice(-40);
  try{localStorage.setItem('fitos_coach_msgs',JSON.stringify(S.coachMessages));}catch(e){}
}

function setApiKey(){
  var key=prompt('Enter your Claude API key (from console.anthropic.com):\n\nStored only on your device.');
  if(key&&key.trim()){
    localStorage.setItem('fitos_claude_key',key.trim());
    if(!S.coachMessages.length){
      var _cp=S.profile||{}; var _ct=calcTDEE?calcTDEE():{targetCal:2000,proteinG:180};
    var greeting='Hey '+(_cp.name||'champ')+'! '+getCoachName()+'. '+(_cp.goal?'Goal: '+_cp.goal+' \u2014 I\'ve got you. ':'')+"Target today: "+_ct.targetCal+" cal, "+_ct.proteinG+"g protein. Ask me anything \u2014 form, meals, how to break a plateau. Let's get after it.";
      S.coachMessages.push({role:'assistant',content:greeting,ts:Date.now()});
      saveCoachHistory();
    }
    if(S.showCoach) refreshCoach(); else openCoach();
  }
}

function renderCoach(){
  var name=getCoachName();
  var emoji=getCoachEmoji();
  var hasKey=true; // default key always available
  var msgs=S.coachMessages;
  if(!msgs.length){
    msgs=[{role:'assistant',content:'Hey '+(S.profile.name||'champ')+'! '+name+' here. What do you need?',ts:Date.now()}];
  }
  return '<div class="coach-overlay">'+
    '<div class="coach-header">'+
      '<div class="coach-avatar">'+emoji+'</div>'+
      '<div style="flex:1">'+
        '<div style="font-size:1rem;font-weight:700">'+name+'</div>'+
        '<div style="font-size:0.72rem;color:var(--green)">Your AI Personal Trainer</div>'+
      '</div>'+
      '<button onclick="closeCoach()" style="background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:6px 10px;font-size:0.85rem;cursor:pointer;margin-left:6px">✕</button>'+
    '</div>'+
    '<div class="coach-messages" id="coach-msgs">'+
      msgs.map(function(m){
        return '<div class="coach-bubble '+(m.role==='user'?'user':'coach')+'">'+m.content+'</div>';
      }).join('')+
      (S.coachTyping?'<div class="coach-bubble coach"><div class="coach-typing"><div class="coach-dot"></div><div class="coach-dot"></div><div class="coach-dot"></div></div></div>':'')+
    '</div>'+
    '<div class="coach-input-row">'+
      '<input class="coach-input" id="coach-input-field" type="text" placeholder="Ask '+name+' anything..." '+
        'onkeydown="if(event.key===&quot;Enter&quot;&&!event.shiftKey){event.preventDefault();sendCoachMessage();}"/>'+
      '<button class="coach-send" onclick="sendCoachMessage()">➤</button>'+
    '</div>'+
  '</div>';
}


initApp();
</script>
