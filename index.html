function generateSessionReview(){
  var btn=document.getElementById('session-ai-btn');
  var out=document.getElementById('session-review-output');
  if(!btn||!out) return;
  btn.disabled=true;
  btn.textContent='Getting your review...';
  var sess=S.gymHistory[S.gymHistory.length-1]||{};
  var lines=[];
  Object.entries(sess.sets||{}).forEach(function(entry){
    var exId=entry[0]; var sets=entry[1];
    if(!sets||!sets.length) return;
    var exName=exId;
    Object.values(WK||{}).forEach(function(day){if(day&&day.exercises)day.exercises.forEach(function(e){if(e.id===exId)exName=e.name;});});
    var setStr=sets.filter(Boolean).map(function(s){return s.weight+'kg\xd7'+s.reps;}).join(', ');
    lines.push(exName+': '+setStr);
  });
  var p=S.profile||{};
  var prompt='You are FitOS AI Coach, an elite Australian PT. Give a sharp, punchy post-session review.\n\n'
    +'ATHLETE: '+(p.name||'Athlete')+' | '+(p.age||'?')+'yr | '+(p.weight||'?')+'kg\n'
    +'GOAL: '+(p.goal||'?')+' | LEVEL: '+(p.experience||'?')+'\n'
    +'INJURIES: '+(p.injuries&&p.injuries.length?p.injuries.join(', '):'None')+'\n'
    +'SESSION: Day '+(sess.day||'?')+' — Week '+(sess.week||'?')+'\n\n'
    +'WHAT THEY DID:\n'+(lines.length?lines.join('\n'):'No sets logged')+'\n\n'
    +'Write a short post-session review with:\n'
    +'💪 GOOD WORK (what they nailed)\n'
    +'🎯 KEY FOCUS FOR NEXT SESSION (one specific cue or load target)\n'
    +'🔄 RECOVERY TIP (practical, specific to what they just did)\n\n'
    +'Tone: Australian PT energy, direct, no waffle. Max 150 words.';
  fetch(FITOS_WORKER_URL,{
    method:'POST',
    headers:{'content-type':'application/json'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:400,system:buildCoachSystemPrompt(),messages:[{role:'user',content:prompt}]})
  }).then(function(r){return r.json();}).then(function(data){
    btn.style.display='none';
    out.style.display='block';
    if(data.content&&data.content[0]&&data.content[0].text){
      out.textContent=data.content[0].text;
    } else {
      out.textContent='Could not get review right now. Try again shortly.';
    }
  }).catch(function(err){
    btn.disabled=false;
    btn.textContent='🤖 Get AI Session Review';
    out.style.display='block';
    out.textContent='Connection error. Check your internet and try again.';
  });
}

    {id:'g17',name:'Blueberries',detail:'250g — antioxidants'},
    {id:'g18',name:'Cherry tomatoes',detail:'250g punnet'},

  ].filter(Boolean);

// EAT TAB
// ═══════════════════════════════════════════════════════════════════════════
function navEatDate(dir){
  var d=new Date(S.logDate||todayStr());
  d.setDate(d.getDate()+dir);
  S.logDate=d.toDateString();
  render();
}
function eatDateLabel(ds){
  if(ds===todayStr()) return 'Today';
  var yest=new Date(); yest.setDate(yest.getDate()-1);
  if(ds===yest.toDateString()) return 'Yesterday';
  var tom=new Date(); tom.setDate(tom.getDate()+1);
  if(ds===tom.toDateString()) return 'Tomorrow';
  return new Date(ds).toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
}
function renderEat(){
  const ACTIVE_MEALS=getPersonalisedMeals();
  const eatDate=S.logDate||todayStr();
  const isToday=eatDate===todayStr();
  const isFuture=new Date(eatDate)>new Date(todayStr());
  const isPast=!isToday&&!isFuture;
  // Macros: meal-checked items (today only) + food log for the viewed date
  const eaten=isToday?ACTIVE_MEALS.filter(m=>S.mealChecked.has(m.id)):[];
  const dateLog=S.foodLog.filter(f=>f.date===eatDate);
  const totCal=eaten.reduce((a,m)=>a+m.items.reduce((b,i)=>b+i.cal,0),0)+dateLog.reduce((a,f)=>a+(f.cal||0),0);
  const totProt=eaten.reduce((a,m)=>a+m.items.reduce((b,i)=>b+i.p,0),0)+dateLog.reduce((a,f)=>a+(f.p||0),0);
  const totCarb=eaten.reduce((a,m)=>a+m.items.reduce((b,i)=>b+i.c,0),0)+dateLog.reduce((a,f)=>a+(f.c||0),0);
  const totFat=eaten.reduce((a,m)=>a+m.items.reduce((b,i)=>b+i.f,0),0)+dateLog.reduce((a,f)=>a+(f.f||0),0);
  const T=getTargets();
  const hasProfile=S.profile&&S.profile.weight&&S.profile.height&&S.profile.age;
  const tdeeData=hasProfile?calcTDEE():null;
  return`<div class="top-bar">
  <div><div class="top-title">Eat</div><div class="top-sub">${isToday?'Target: '+T.cal+' cal · '+T.protein+'g protein':isFuture?'📅 Planning ahead · '+eatDateLabel(eatDate):'📖 History · '+eatDateLabel(eatDate)}</div></div>
</div>
<!-- Date Navigator -->
<div style="display:flex;align-items:center;padding:7px 12px;background:var(--s1);border-bottom:1px solid var(--border);gap:8px">
  <button onclick="navEatDate(-1)" style="flex-shrink:0;width:34px;height:34px;background:var(--s2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:0.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center">◀</button>
  <div style="flex:1;text-align:center;min-width:0">
    <div style="font-size:0.95rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${eatDateLabel(eatDate)}</div>
    <div style="font-size:0.62rem;margin-top:1px;color:${isToday?'var(--green)':isFuture?'var(--blue)':'var(--muted)'}">${isToday?'● Live':isFuture?'📅 Plan ahead':'📖 Past log'}</div>
  </div>
  <button onclick="navEatDate(1)" style="flex-shrink:0;width:34px;height:34px;background:var(--s2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:0.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center">▶</button>
</div>
${!isToday?`<div style="margin:8px 16px 0;padding:8px 12px;background:${isFuture?'rgba(74,144,217,0.08)':'rgba(255,255,255,0.04)'};border:1px solid ${isFuture?'rgba(74,144,217,0.25)':'var(--border)'};border-radius:10px;display:flex;align-items:center;justify-content:space-between">
  <span style="font-size:0.78rem;color:${isFuture?'var(--blue)':'var(--muted)'}">${isFuture?'📅 Pre-logging meals for this date':'📖 Viewing past food log'}</span>
  <button onclick="S.logDate=todayStr();render()" style="background:var(--green);border:none;border-radius:7px;padding:4px 10px;color:#fff;font-size:0.7rem;font-weight:700;cursor:pointer">Back to Today</button>
</div>`:''}
${hasProfile&&tdeeData?`
<div class="targets-card" style="border:1px solid var(--green)30">
  <div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--green);font-weight:700;margin-bottom:10px">⚡ Your Personalised Targets</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px">
    <div style="text-align:center"><div style="font-size:1.35rem;font-weight:800;color:var(--green)">${tdeeData.tdee}</div><div style="font-size:0.65rem;color:var(--muted)">TDEE kcal</div></div>
    <div style="text-align:center"><div style="font-size:1.35rem;font-weight:800;color:${tdeeData.deficit<0?'var(--amber)':'var(--blue)'}">${tdeeData.targetCal}</div><div style="font-size:0.65rem;color:var(--muted)">Target kcal</div></div>
    <div style="text-align:center"><div style="font-size:1.35rem;font-weight:800;color:var(--blue)">${tdeeData.proteinG}g</div><div style="font-size:0.65rem;color:var(--muted)">Protein</div></div>
  </div>
  <div style="display:flex;gap:8px;font-size:0.72rem;color:var(--muted)">
    <span>BMR <strong style="color:#ddd">${tdeeData.bmr}</strong></span>
    <span>·</span>
    <span>×<strong style="color:#ddd">${tdeeData.mult}</strong> activity</span>
    <span>·</span>
    <span>${tdeeData.deficit<0?'Deficit':'Surplus'} <strong style="color:${tdeeData.deficit<0?'var(--amber)':'var(--green)'}">${Math.abs(tdeeData.deficit)} kcal</strong></span>
  </div>
  ${(()=>{
    var _adj=parseInt(localStorage.getItem('fitos_cal_adjust')||'0')||0;
    var _isLoss=tdeeData.deficit<=0;
    var _min=_isLoss?-300:0;
    var _max=_isLoss?0:300;
    var _col=_adj<0?'var(--amber)':_adj>0?'var(--green)':'var(--muted)';
    var _sign=_adj>0?'+':'';
    return '<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+
        '<div style="font-size:0.72rem;color:var(--muted)">Manual adjustment</div>'+
        '<div style="font-size:0.82rem;font-weight:700;color:'+_col+'">'+_sign+_adj+' kcal</div>'+
      '</div>'+
      '<input type="range" min="'+_min+'" max="'+_max+'" step="50" value="'+_adj+'" '+
        'style="width:100%;accent-color:var(--green);cursor:pointer" '+
        'oninput="localStorage.setItem(&quot;fitos_cal_adjust&quot;,this.value);render()"/>'+
      '<div style="display:flex;justify-content:space-between;font-size:0.65rem;color:var(--muted);margin-top:2px">'+
        '<span>'+_min+' kcal</span><span>0</span><span>+'+_max+' kcal</span>'+
      '</div>'+
    '</div>';
  })()}
</div>`:''}

<div style="padding:16px">
  <!-- Macro summary -->
  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px">
      <div><div style="font-size:1.8rem;font-weight:800;color:var(--green)">${totCal}</div><div style="font-size:0.72rem;color:var(--muted)">/ ${T.cal} cal</div></div>
      <div style="text-align:right;font-size:0.78rem;color:var(--muted)">${T.cal-totCal>0?`${T.cal-totCal} remaining`:'✅ Target hit'}</div>
    </div>
    <div class="macro-bar-wrap">
      <div class="macro-label"><span style="color:var(--blue)">Protein</span><span>${totProt}g / ${T.protein}g</span></div>
      <div class="macro-bar"><div class="macro-fill" style="width:${pct(totProt,T.protein)}%;background:var(--blue)"></div></div>
    </div>
    <div class="macro-bar-wrap">
      <div class="macro-label"><span style="color:var(--amber)">Carbs</span><span>${totCarb}g / ${T.carbs}g</span></div>
      <div class="macro-bar"><div class="macro-fill" style="width:${pct(totCarb,T.carbs)}%;background:var(--amber)"></div></div>
    </div>
    <div class="macro-bar-wrap">
      <div class="macro-label"><span style="color:var(--red)">Fat</span><span>${totFat}g / ${T.fat}g</span></div>
      <div class="macro-bar"><div class="macro-fill" style="width:${pct(totFat,T.fat)}%;background:var(--red)"></div></div>
    </div>
    <!-- Water — today only -->
    ${isToday?`<div style="margin-top:12px">
      <div class="macro-label" style="margin-bottom:8px"><span style="color:var(--blue)">💧 Water</span><span style="color:var(--muted)">${(S.waterDone*0.25).toFixed(1)}L / ${(MEAL_TARGETS.water*0.25).toFixed(1)}L</span></div>
      <div class="water-track">
        ${Array.from({length:MEAL_TARGETS.water},(_,i)=>`<div class="water-drop${i<S.waterDone?' filled':''}" onclick="logWater(${i})" title="${((i+1)*0.25).toFixed(2)}L">💧</div>`).join('')}
      </div>
    </div>`:''}
  </div>

  <!-- Food log — grouped by meal -->
  ${(()=>{
    const viewDate=eatDate;
    const logEntries=S.foodLog.filter(f=>f.date===viewDate);
    if(!logEntries.length) return '';
    const cats=[
      {key:'breakfast',icon:'🌅',label:'Breakfast',col:'#f5a623'},
      {key:'lunch',icon:'☀️',label:'Lunch',col:'#4a90d9'},
      {key:'dinner',icon:'🌙',label:'Dinner',col:'#9b59b6'},
      {key:'snack',icon:'🍎',label:'Snacks',col:'#1D9E75'},
      {key:'untagged',icon:'📝',label:'Other',col:'#666'}
    ];
    return cats.map(cat=>{
      const items=logEntries.filter(f=>(f.meal||'untagged')===cat.key);
      if(!items.length) return '';
      const catCal=items.reduce((a,f)=>a+(f.cal||0),0);
      const catP=items.reduce((a,f)=>a+(f.p||0),0);
      return`<div style="margin-bottom:16px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:7px">
            <span style="font-size:1.1rem">${cat.icon}</span>
            <span style="font-size:0.82rem;font-weight:700;color:${cat.col}">${cat.label}</span>
            <span style="font-size:0.68rem;color:var(--muted)">${items.length} item${items.length>1?'s':''}</span>
          </div>
          <div style="font-size:0.8rem;font-weight:700;color:${cat.col}">${catCal} cal · ${catP}g P</div>
        </div>
        ${items.map(f=>`<div class="food-log-item" id="fli-${f.id}"
          ontouchstart="swipeStart(event,'${f.id}')"
          ontouchmove="swipeMove(event,'${f.id}')"
          ontouchend="swipeEnd(event,'${f.id}')">
          <div class="food-log-inner" id="fli-inner-${f.id}">
            <div style="flex:1;min-width:0">
              <div class="food-log-name">${f.name}${f.brand?` <span style="color:var(--muted);font-weight:400;font-size:0.72rem">${f.brand}</span>`:''}</div>
              <div style="font-size:0.72rem;color:var(--muted);margin-top:1px">${f.qty&&f.qty!==100?`${f.qty}g · `:''}P:${f.p}g · C:${f.c}g · F:${f.f}g${f.fiber?` · Fib:${f.fiber}g`:''}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;margin-left:8px;flex-shrink:0">
              <div class="food-log-cal">${f.cal}</div>
              <select onchange="S.foodLog.find(x=>x.id==='${f.id}').meal=this.value;saveDailyState();render()" style="background:var(--s3);border:1px solid var(--border);border-radius:6px;padding:3px 4px;color:var(--muted);font-size:0.65rem;cursor:pointer">
                ${['breakfast','lunch','dinner','snack','untagged'].map(m=>`<option value="${m}"${(f.meal||'untagged')===m?' selected':''}>${m==='breakfast'?'🌅':m==='lunch'?'☀️':m==='dinner'?'🌙':m==='snack'?'🍎':'📝'}</option>`).join('')}
              </select>
            </div>
          </div>
        </div>`).join('')}
      </div>`;
    }).join('');
  })()}
  <!-- Log Food button -->
  <div style="display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:16px">
    <button onclick="openFoodPanel('${eatDate}')" style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:var(--s2);border:1px dashed var(--green)60;border-radius:12px;color:var(--green);font-size:0.9rem;font-weight:700;cursor:pointer">
    + ${isToday?'Log Food / Scan Barcode':'Add Food to '+eatDateLabel(eatDate)}
  </button>
    <button onclick="copyMealsFromDate('${eatDate}')" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:13px 10px;background:var(--s2);border:1px solid var(--border);border-radius:12px;color:var(--muted);font-size:0.7rem;font-weight:600;cursor:pointer;white-space:nowrap;line-height:1.3" title="Copy food from previous day">
      📋 Copy<br>${isToday?'Yesterday':'Prev Day'}
    </button>
  </div>

  <!-- Meals — today: full interactive; future: planned template; past: hidden -->
  ${!isPast?ACTIVE_MEALS.map(m=>{
    const isChecked=isToday&&S.mealChecked.has(m.id);
    const isOpen=S.expandedMeal===m.id;
    const mCal=m.items.reduce((a,i)=>a+i.cal,0);
    const mProt=m.items.reduce((a,i)=>a+i.p,0);
    return`<div class="meal-card${isChecked?' ':''}" style="${isChecked?'opacity:.7':''};${isFuture?'border-color:rgba(74,144,217,0.3)':''}">
      <div class="meal-header" onclick="toggleMeal('${m.id}')">
        <div>
          <div class="meal-title">${m.icon} ${m.name} <span style="font-size:0.7rem;color:var(--muted)">${m.time}</span>${isFuture?'<span style="font-size:0.62rem;background:rgba(74,144,217,0.15);color:var(--blue);border-radius:5px;padding:1px 5px;margin-left:6px">Planned</span>':''}</div>
          <div class="meal-cals">${mCal} cal · ${mProt}g protein</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          ${isToday?`<button onclick="event.stopPropagation();checkMeal('${m.id}')" style="background:${isChecked?'var(--green)':'var(--s2)'};border:2px solid ${isChecked?'var(--green)':'var(--border)'};border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:1rem;flex-shrink:0">${isChecked?'✓':''}</button>`:''}
          <span style="color:var(--muted);font-size:0.9rem">${isOpen?'▲':'▼'}</span>
        </div>
      </div>
      ${isOpen?`<div class="meal-body">
        ${m.items.map(item=>`<div class="food-row">
          <div><div>${item.name}</div><div class="food-macros">P:${item.p}g C:${item.c}g F:${item.f}g</div></div>
          <div style="font-size:0.85rem;font-weight:600;color:var(--green)">${item.cal} cal</div>
        </div>`).join('')}
        ${m.recipe?`<div class="recipe-box">
          <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--green);font-weight:700;margin-bottom:8px">📋 How to Cook</div>
          <div class="recipe-meta">
            ${m.prepTime?`<span>⏱ Prep ${m.prepTime}</span>`:''}
            ${m.cookTime&&m.cookTime!=='0 min'?`<span>🔥 Cook ${m.cookTime}</span>`:''}
            ${m.serves?`<span>🍽 ${m.serves} serve</span>`:''}
          </div>
          ${m.recipe.map((r,ri)=>`<div class="recipe-step"><div class="step-num">${ri+1}</div><div class="recipe-step-text">${r.s}</div></div>`).join('')}
        </div>`:''}
      </div>`:''}
    </div>`;
  }).join(''):'<div style="padding:12px 0;text-align:center;font-size:0.78rem;color:var(--muted)">Meal plan shown for today + future only — use the food log above to see what was eaten on past days.</div>'}
  <div style="height:16px"></div>

  <!-- SHOPPING LIST SECTION (folded from Shop tab) -->
  ${renderGrocerySection()}

  <div style="height:20px"></div>
</div>`;
}

function renderGrocerySection(){
  var ACTIVE_GROCERY=getPersonalisedGrocery();
  var total=ACTIVE_GROCERY.reduce(function(a,c){return a+c.items.length;},0);
  var ticked=S.shopTicked.size;
  var pctVal=total?Math.round(ticked/total*100):0;
  var rows=ACTIVE_GROCERY.map(function(cat){
    var items=cat.items.map(function(item,idx){
      var key=(cat.name||cat.cat||'cat')+'_'+idx;
      var done=S.shopTicked.has(key);
      return '<div class="shop-item'+(done?' ticked':'')+'" onclick="toggleShop(\''+key+'\')">'  
        +'<div class="shop-check">'+(done?'✓':'')+'</div>'
        +'<div style="flex:1"><div class="shop-name">'+item.name+'</div>'+(item.detail?'<div class="shop-detail">'+item.detail+'</div>':'')+'</div>'
        +'</div>';
    }).join('');
    return '<div class="shop-category"><div class="shop-cat-title">'+(cat.name||cat.cat||'')+'</div>'+items+'</div>';
  }).join('');
  return '<div style="margin-top:8px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;padding:0 16px 10px">'
      +'<div><div style="font-size:0.95rem;font-weight:700">🛒 Shopping List</div>'
      +'<div style="font-size:0.72rem;color:var(--muted)">'+(ticked)+' of '+total+' items ticked</div></div>'
      +'<button class="btn btn-sm btn-outline" onclick="clearShop()">Clear ticked</button>'
    +'</div>'
    +'<div style="margin:0 16px 10px;height:4px;background:var(--s3);border-radius:2px;overflow:hidden">'
      +'<div style="height:100%;background:var(--green);border-radius:2px;transition:width .4s;width:'+pctVal+'%"></div>'
    +'</div>'
    +rows
    +'<a class="woolies-btn" href="https://www.woolworths.com.au" target="_blank">🛒 Shop at Woolworths</a>'
    +'<div style="height:8px"></div>'
    +'</div>';
}

function renderShop(){
  const ACTIVE_GROCERY=getPersonalisedGrocery();
  const total=ACTIVE_GROCERY.reduce((a,c)=>a+c.items.length,0);
  const ticked=S.shopTicked.size;
  return`<div class="top-bar">
  <div><div class="top-title">Shop</div><div class="top-sub">Weekly grocery list · ${ticked}/${total} items</div></div>
  <button class="btn btn-sm btn-outline" onclick="clearShop()">Clear ticked</button>
</div>

function renderWeekSummary(){
  var T=getTargets();
  var today=new Date();
  var weekDays=[];
  for(var i=6;i>=0;i--){var d=new Date(today);d.setDate(d.getDate()-i);weekDays.push(d.toDateString());}
  var calTotal=0,protTotal=0,sessionsLogged=0,daysWithData=0;
  weekDays.forEach(function(dateStr){
    var dd=getDateData(dateStr);
    var cal=dd.cal||0; var prot=dd.protein||0;
    if(cal>0||prot>0) daysWithData++;
    calTotal+=cal; protTotal+=prot;
    if(dd.workout) sessionsLogged++;
  });
  if(daysWithData===0) return ''; // nothing to show yet

  var avgCal=daysWithData>0?Math.round(calTotal/daysWithData):0;
  var avgProt=daysWithData>0?Math.round(protTotal/daysWithData):0;
  var calAdh=Math.round(pct(avgCal,T.cal));
  var protAdh=Math.round(pct(avgProt,T.protein));
  var p=S.profile||{};
  var goal=(p.goal||'').toLowerCase();

  // Adaptive feedback line
  var feedback='';
  if(sessionsLogged===0&&daysWithData>=3){feedback='No sessions logged yet this week — the block is written, go execute it.';}
  else if(sessionsLogged>=3&&protAdh>=85){feedback='Solid week. Consistency is the whole game — keep stacking.';}
  else if(protAdh<70&&(goal.match(/build|muscle|bulk/))){feedback='Protein is under target — muscle growth stalls without it. Hit '+T.protein+'g today.';}
  else if(calAdh>115&&goal.match(/fat|lose|lean|cut/)){feedback='Calories over target this week — tighten the food log. The deficit is doing the work.';}
  else if(sessionsLogged>=4&&calAdh>=85){feedback='You\'re putting in the work. Progression is happening — trust the process.';}
  else if(daysWithData>=3){feedback='Keep logging — the more data, the smarter your next block gets.';}

  var barW=function(v,max){return Math.min(100,Math.round(v/max*100));};

  return '<div class="card-title" style="margin-top:8px">This Week</div>'+
    '<div class="card" style="padding:14px">'+
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">'+
        '<div style="text-align:center">'+
          '<div style="font-size:1.5rem;font-weight:700;color:var(--green)">'+sessionsLogged+'</div>'+
          '<div style="font-size:0.68rem;color:var(--muted)">Sessions</div>'+
        '</div>'+
        '<div style="text-align:center">'+
          '<div style="font-size:1.5rem;font-weight:700;color:var(--blue)">'+calAdh+'%</div>'+
          '<div style="font-size:0.68rem;color:var(--muted)">Cal adherence</div>'+
        '</div>'+
        '<div style="text-align:center">'+
          '<div style="font-size:1.5rem;font-weight:700;color:var(--amber)">'+protAdh+'%</div>'+
          '<div style="font-size:0.68rem;color:var(--muted)">Protein hit</div>'+
        '</div>'+
      '</div>'+
      '<div style="height:3px;background:var(--s3);border-radius:2px;margin-bottom:4px">'+
        '<div style="height:100%;width:'+barW(avgCal,T.cal)+'%;background:var(--green);border-radius:2px;transition:width .5s ease"></div>'+
      '</div>'+
      '<div style="font-size:0.7rem;color:var(--muted);margin-bottom:8px">Avg '+avgCal+'kcal / '+T.cal+'kcal target</div>'+
      '<div style="height:3px;background:var(--s3);border-radius:2px;margin-bottom:4px">'+
        '<div style="height:100%;width:'+barW(avgProt,T.protein)+'%;background:var(--blue);border-radius:2px;transition:width .5s ease"></div>'+
      '</div>'+
      '<div style="font-size:0.7rem;color:var(--muted);margin-bottom:10px">Avg '+avgProt+'g protein / '+T.protein+'g target</div>'+
      (feedback?'<div style="padding:9px 11px;background:rgba(29,158,117,0.08);border:1px solid rgba(29,158,117,0.2);border-radius:9px;font-size:0.8rem;color:var(--text);line-height:1.5">💬 '+feedback+'</div>':'')+

// PERSONALISED HABITS ENGINE
// ═══════════════════════════════════════════════════════════════════════════
function getPersonalisedHabits(){
  var p=S.profile||{};
  var T=getTargets();
  var goal=(p.goal||'').toLowerCase();
  var exp=(p.experience||'').toLowerCase();
  var lifestyle=(p.lifestyle||'').toLowerCase();
  var diet=(p.dietStyle||[]);
  var isBegin=exp.match(/begin|new|starter/);
  var isBuild=goal.match(/build|muscle|bulk/);
  var isFatLoss=goal.match(/fat|lose|lean|cut/);
  var isAthlete=goal.match(/athlet|hyrox|perform|sport/);
  var isRecomp=goal.match(/recomp/);
  var isDeskWorker=lifestyle.match(/desk|office|sedent|sit/);
  var isTradie=lifestyle.match(/trade|labour|physical|builder|electrician|plumb/);
  var hasDiabetes=(p.medicalConditions||'').toLowerCase().match(/diabet/);
  var isVegan=diet.includes('vegan');
  var isVeget=diet.includes('vegetarian');
  var daysPerWeek=parseInt(p.daysPerWeek)||4;
  var waterGoal=MEAL_TARGETS.water||8;
  var habits=[];

  // Core: always present
  habits.push({id:'h-water',icon:'💧',name:'Drink '+(waterGoal*0.25).toFixed(1)+'L of water',detail:'Every system in your body runs on hydration. Non-negotiable.'});
  habits.push({id:'h-protein',icon:'🥩',name:'Hit your protein target — '+T.protein+'g',detail:isVegan?'Legumes, tofu, tempeh, seitan — stack them up.':isVeget?'Eggs, dairy + plant sources all count.':'Distribute across 3–4 meals for peak muscle protein synthesis.'});

  // Training vs rest day
  var todayIdx=new Date().getDay();
  var block=S.currentBlock;
  var todayIsTrainDay=block&&block.days&&block.days.some(function(d){return d.dayIndex===todayIdx;});
  if(todayIsTrainDay){
    habits.push({id:'h-train',icon:'🏋️',name:"Complete today's workout",detail:'The block is written. Go execute it.'});
  } else {
    habits.push({id:'h-recover',icon:'🧘',name:'Active recovery today',detail:'10–20 min walk + foam roll. Move without destroying yourself.'});
  }

  // Sleep — goal-specific framing
  habits.push({id:'h-sleep',icon:'💤',name:'Sleep 7–9 hours',detail:isBuild?'GH peaks in deep sleep — your gains literally happen here.':isFatLoss?'Sleep deprivation spikes cortisol + ghrelin. Wrecks fat loss.':'Recovery, cognition, mood — all downstream of sleep quality.'});

  // Fat loss / recomp extras
  if(isFatLoss||isRecomp){
    habits.push({id:'h-deficit',icon:'📊',name:'Stay in your calorie target — '+T.cal+'kcal',detail:'Deficit is already engineered. No need to go lower — just hit the number.'});
    habits.push({id:'h-steps',icon:'👟',name:'Hit '+(Math.round(S.stepsGoal/1000))+'K steps',detail:'NEAT accounts for 300–600kcal/day. Walk it in. It compounds.'});
  }
  // Build extras
  if(isBuild||isRecomp){
    habits.push({id:'h-meals',icon:'🍜',name:'Eat every 3–4 hours',detail:'MPS stays elevated for ~4hrs post-meal. Keep the machinery fed.'});
  }
  // Athlete extras
  if(isAthlete){
    habits.push({id:'h-mobility',icon:'🤸',name:'10 min mobility work',detail:'Hip flexors, thoracic spine, ankles — athletic output depends on range of motion.'});
    if(!habits.find(function(h){return h.id==='h-steps';})){
      habits.push({id:'h-steps',icon:'👟',name:'Hit '+(Math.round(S.stepsGoal/1000))+'K steps',detail:'NEAT + aerobic base. Move between sessions.'});
    }
  }
  // Beginner extras
  if(isBegin){
    habits.push({id:'h-form',icon:'🎯',name:'Watch 1 exercise tutorial today',detail:'YouTube: Jeff Nippard or Alan Thrall. Technique compounds like interest.'});
  }
  // Desk worker extras
  if(isDeskWorker){
    habits.push({id:'h-standup',icon:'🖥️',name:'Stand up every 60 minutes',detail:'Prolonged sitting compresses lumbar discs + tanks insulin sensitivity. Set a timer.'});
    if(!habits.find(function(h){return h.id==='h-steps';})){
      habits.push({id:'h-steps',icon:'👟',name:'Hit '+(Math.round(S.stepsGoal/1000))+'K steps',detail:'Counteracts the desk. Break into 2–3 walk breaks through the day.'});
    }
  }
  // Tradie extras
  if(isTradie){
    habits.push({id:'h-stretch',icon:'🧘',name:'5 min stretch post-shift',detail:'Hips, hammies, lower back — trades wreck the posterior chain. Protect it daily.'});
  }
  // Medical extras
  if(hasDiabetes){
    habits.push({id:'h-glucose',icon:'🩸',name:'Monitor blood glucose today',detail:'Exercise significantly impacts glucose levels. Log pre + post training.'});
  }
  if(daysPerWeek>=5){
    habits.push({id:'h-recovery-active',icon:'🛤️',name:'Prioritise recovery — high volume week',detail:'Foam roll, contrast shower, 8hrs sleep. You train hard — recover harder.'});
  }

  // Deduplicate
  var seen={};
  habits=habits.filter(function(h){
    if(!h||!h.id) return false;
    if(seen[h.id]) return false;
    seen[h.id]=true;
    return true;
  });

  return habits;
}

  'alcohol':          {label:'Alcohol',icon:'🍺',replace:['Sparkling water with lime — same ritual, zero damage','Gym session — best buzz is earned','Reach out to a support group or mate','Cold shower — sharpens everything']},
  'vaping':           {label:'Vaping',icon:'💨',replace:['Box breathing: 4 in, 4 hold, 4 out, 4 hold','Chew sugar-free gum or sip water','Do a set of push-ups or burpees','Delay 10 minutes — craving usually passes']},
  'aclass':           {label:'A-Class Substances',icon:'💊',replace:['Professional support is key — consider a counsellor','Intense exercise burns the same neural pathways cleanly','Journal: what is this actually filling?','Connect with someone safe — isolation fuels it']},

};

function getAddictionState(id){
  const d = S.addictionData[id] || {streak:0,bestStreak:0,lastClean:null,slipDate:null,triggers:[],loggedToday:false};
  const today = new Date().toISOString().slice(0,10);
  // auto-detect if they logged yesterday (streak continuity)
  if(d.lastClean && d.lastClean !== today){
    const last = new Date(d.lastClean);
    const now = new Date(today);
    const diffDays = Math.round((now - last) / 86400000);
    if(diffDays > 1 && d.loggedToday){
      // they missed a day — but only reset if they haven't logged today
      d.streak = 0;
    }
    d.loggedToday = false;
  }
  return d;
}

function renderAddictions(){
  const addictions = S.profile.addictions || [];
  if(!addictions.length) return '';
  const today = new Date().toISOString().slice(0,10);
  return `

      ${d.triggers&&d.triggers.length>0?`<div style="margin-top:8px;font-size:0.75rem;color:var(--muted)">Last trigger: "${d.triggers[d.triggers.length-1].text}" — ${d.triggers[d.triggers.length-1].date}</div>`:''}
    </div>`;
  }).join('')}`;
}

function logAddictionClean(id){
  const today = new Date().toISOString().slice(0,10);
  const d = S.addictionData[id] || {streak:0,bestStreak:0,lastClean:null,slipDate:null,triggers:[],loggedToday:false};
  if(d.loggedToday) return;
  if(d.lastClean){
    const last = new Date(d.lastClean);
    const now = new Date(today);
    const diff = Math.round((now - last) / 86400000);
    d.streak = diff===1 ? (d.streak||0)+1 : 1;
  } else {
    d.streak = 1;
  }
  d.lastClean = today;
  d.loggedToday = true;
  d.bestStreak = Math.max(d.bestStreak||0, d.streak);
  S.addictionData[id] = d;
  localStorage.setItem('fitos_addiction_data', JSON.stringify(S.addictionData));
  render();
}

function logAddictionSlip(id){
  const today = new Date().toISOString().slice(0,10);
  const d = S.addictionData[id] || {streak:0,bestStreak:0,lastClean:null,slipDate:null,triggers:[],loggedToday:false};
  const prev = d.streak||0;
  d.bestStreak = Math.max(d.bestStreak||0, prev);
  d.streak = 0;
  d.slipDate = today;
  d.loggedToday = false;
  S.addictionData[id] = d;
  localStorage.setItem('fitos_addiction_data', JSON.stringify(S.addictionData));
  // Compassionate prompt
  setTimeout(()=>alert('Hey — slipping doesn\'t erase the work you\'ve done. It\'s one data point. Tomorrow\'s streak starts now. You\'ve got this. 💪'), 50);
  render();
}

function saveAddictionTrigger(id){
  const inp = document.getElementById('trigger-'+id);
  if(!inp||!inp.value.trim()) return;
  const today = new Date().toISOString().slice(0,10);
  const d = S.addictionData[id] || {streak:0,bestStreak:0,lastClean:null,slipDate:null,triggers:[],loggedToday:false};
  if(!d.triggers) d.triggers=[];
  d.triggers.push({date:today,text:inp.value.trim()});
  if(d.triggers.length>10) d.triggers=d.triggers.slice(-10);
  S.addictionData[id] = d;
  localStorage.setItem('fitos_addiction_data', JSON.stringify(S.addictionData));
  inp.value='';
  render();
}

function copyYesterdayMeals(){ copyMealsFromDate(todayStr()); }
function copyMealsFromDate(toDate){
  // Copy food from the day BEFORE toDate into toDate
  var fromD=new Date(toDate); fromD.setDate(fromD.getDate()-1);
  var fromDate=fromD.toDateString();
  var fromLog=S.foodLog.filter(function(f){return f.date===fromDate;});
  if(!fromLog.length){alert("No food logged on "+fromD.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'})+" to copy.");return;}
  var already=S.foodLog.filter(function(f){return f.date===toDate;});
  var fromLabel=fromDate===new Date(Date.now()-864e5).toDateString()?'yesterday':fromD.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
  var toLabel=toDate===todayStr()?'today':new Date(toDate).toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
  var msg='Copy '+fromLog.length+' item'+(fromLog.length>1?'s':'')+' from '+fromLabel+' into '+toLabel+'?'+(already.length?' ('+already.length+' item'+(already.length>1?'s':'')+' already logged)':'');
  if(!confirm(msg)) return;
  fromLog.forEach(function(f){
    S.foodLog.push(Object.assign({},f,{id:Date.now().toString()+'_'+Math.random().toString(36).slice(2),date:toDate}));
  });
  saveDailyState();
  render();
}
function buildFoodResultsHTML(){
  var results=S.foodResults;
  var out='';
  if(S.foodSearching&&results.length===0) out+='<div style="text-align:center;padding:30px;color:var(--muted)">Searching…</div>';
  if(!S.foodSearching&&results.length===0&&S.foodQuery) out+='<div style="text-align:center;padding:20px;color:var(--muted);font-size:0.85rem">No results — try a different search term</div>';
  var memCount=results.filter(function(r){return r._memory;}).length;
  var apiCount=results.filter(function(r){return !r._memory;}).length;
  if(memCount>0&&apiCount>0&&S.foodQuery) out+='<div class="food-memory-label">🕐 Your history</div>';
  else if(memCount>0&&!S.foodQuery) out+='<div class="food-memory-label">🕐 Recently logged</div>';
  results.forEach(function(r,i){
    var sg=r.servingG;
    var dc=sg?Math.round(r.cal*sg/100):r.cal;
    var dp=sg?Math.round(r.p*sg/100):r.p;
    var dcc=sg?Math.round(r.c*sg/100):r.c;
    var df=sg?Math.round(r.f*sg/100):r.f;
    var lbl=sg?'per serving':'per 100g';
    var isFirstApi=!r._memory&&i>0&&results[i-1]&&results[i-1]._memory;
    if(isFirstApi) out+='<div class="food-memory-label" style="margin-top:6px">🔍 Search results</div>';
    out+='<button class="'+(r._memory?'food-memory-item':'food-result-item')+'" onclick="selectFood('+i+')" style="width:100%;text-align:left;'+(r._memory?'':'background:var(--s1);color:var(--text);border:1px solid var(--border)')+'">'+
      '<div class="food-result-name">'+(r.au?'🇦🇺 ':'')+r.name+(r._memory?'<span class="food-memory-badge">✓ logged before</span>':'')+'</div>'+
      (r.brand?'<div class="food-result-brand">'+r.brand+'</div>':'')+
      '<div class="food-result-macros">'+
        '<span style="color:var(--green)">⚡ '+dc+' cal</span>'+
        '<span style="color:var(--blue)">P:'+dp+'g</span>'+
        '<span style="color:var(--amber)">C:'+dcc+'g</span>'+
        '<span style="color:var(--red)">F:'+df+'g</span>'+
        '<span style="color:var(--muted)">'+lbl+'</span>'+
      '</div>'+
    '</button>';
  });
  return out;
}
function refreshFoodResults(){
  var el=document.getElementById('food-results-scroll');
  if(!el){render();return;}
  el.innerHTML=buildFoodResultsHTML();
}
function foodInput(val){
  S.foodQuery=val;
  if(val.length<2){
    var recent=[];var seen={};
    Object.values(S.foodMemory||{}).forEach(function(arr){
      arr.forEach(function(e){var k=e.name+'__'+(e.brand||'');if(!seen[k]){seen[k]=true;recent.push(Object.assign({},e,{_memory:true}));}});
    });
    recent.sort(function(a,b){return(b.lastUsed||0)-(a.lastUsed||0);});
    S.foodResults=recent.slice(0,8);
    refreshFoodResults();return;
  }
  var memHits=getMemoryResults(val);
  if(memHits.length){S.foodResults=memHits;refreshFoodResults();}
  clearTimeout(S._foodTimer);
  S._foodTimer=setTimeout(function(){doFoodSearch();},420);
}
function openFoodPanel(date){
  S.showFoodPanel=true;S.pendingFood=null;S.foodQuery='';S.logDate=date||todayStr();
  // Pre-populate with recently logged foods
  var recent=[];var seen={};
  Object.values(S.foodMemory||{}).forEach(function(arr){
    arr.forEach(function(e){
      var k=e.name+'__'+(e.brand||'');
      if(!seen[k]){seen[k]=true;recent.push({...e,_memory:true});}
    });
  });
  recent.sort(function(a,b){return (b.lastUsed||0)-(a.lastUsed||0);});
  S.foodResults=recent.slice(0,8);
  render();
}
function closeFoodPanel(){S.showFoodPanel=false;S.pendingFood=null;S.foodResults=[];render();}

async function doFoodSearch(type){

  if(type==='restaurants'){S.foodResults=AU_RESTAURANT_DB.slice();refreshFoodResults();return;}
  const q=S.foodQuery.trim();
  if(!q)return;

  // ── Step 1: Instant local results shown while API loads ──────────────────
  var memHits=getMemoryResults(S.foodQuery);
  const qLow0=q.toLowerCase();
  const qWords0=qLow0.replace(/[^a-z0-9 ]/g,' ').split(' ').filter(w=>w.length>1);
  const popularHits=POPULAR_FOODS_DB.filter(function(item){
    const n=item.name.toLowerCase();
    return n.includes(qLow0)||qWords0.some(function(w){return w.length>2&&n.includes(w);});
  });
  const auLocalMatches=qWords0.length>0?AU_RESTAURANT_DB.filter(function(item){
    const hay=(item.name+' '+(item.brand||'')).toLowerCase().replace(/[^a-z0-9 ]/g,' ');
    return qWords0.some(function(w){return hay.includes(w);});
  }):[];
  var localSeen=new Set(memHits.map(function(x){return x.name.toLowerCase();}));
  var localInstant=popularHits.filter(function(x){return!localSeen.has(x.name.toLowerCase());}).slice(0,4);
  localInstant.forEach(function(x){localSeen.add(x.name.toLowerCase());});
  var localRestaurant=auLocalMatches.filter(function(x){return!localSeen.has(x.name.toLowerCase());}).slice(0,3);
  S.foodResults=[...memHits,...localInstant,...localRestaurant];
  S.foodSearching=true;
  refreshFoodResults(); // show what we have instantly, spinner indicates more loading

  // ── Step 2: Barcode ───────────────────────────────────────────────────────
  if(/^\d{8,14}$/.test(q)){
    try{
      let found=false;
      for(const base of['https://au.openfoodfacts.org','https://world.openfoodfacts.org']){
        if(found)break;
        try{
          const r=await fetch(base+'/api/v2/product/'+q+'.json');
          const d=await r.json();
          if(d.status===1&&d.product){
            const pr=d.product;const n=pr.nutriments;
            var sg=null;
            if(pr.serving_size){var m=(pr.serving_size||'').match(/(\d+\.?\d*)\s*g/i);if(m)sg=parseFloat(m[1]);}
            if(!sg&&n['energy-kcal_serving']&&n['energy-kcal_100g']&&n['energy-kcal_100g']>0){
              sg=Math.round((n['energy-kcal_serving']/n['energy-kcal_100g'])*100);
            }
            S.foodResults=[{
              name:pr.product_name||pr.abbreviated_product_name||'Unknown Product',
              brand:pr.brands||'',
              cal:Math.round(n['energy-kcal_100g']||0),p:Math.round(n['proteins_100g']||0),
              c:Math.round(n['carbohydrates_100g']||0),f:Math.round(n['fat_100g']||0),
              fiber:Math.round((n['fiber_100g']||0)*10)/10,sugars:Math.round((n['sugars_100g']||0)*10)/10,
              sodium:Math.round((n['sodium_100g']||0)*1000),sat_fat:Math.round((n['saturated-fat_100g']||0)*10)/10,
              servingG:sg||null,au:base.includes('au.')
            }];
            found=true;
          }
        }catch(e){}
      }
      if(!found)S.foodResults=[];
    }catch{S.foodResults=[];}
    S.foodSearching=false;refreshFoodResults();return;
  }

  // ── Step 3: Always call Open Food Facts API (AU first, world fills gaps) ──
  const parseProds=function(prods){
    return prods
      .filter(function(p){return p.product_name&&p.nutriments&&(p.nutriments['energy-kcal_100g']||p.nutriments['energy-kcal']||p.nutriments['energy_100g']);})
      .slice(0,12).map(function(p){
        return{
          name:p.product_name,brand:p.brands||'',
          cal:Math.round(p.nutriments['energy-kcal_100g']||p.nutriments['energy-kcal']||Math.round((p.nutriments['energy_100g']||0)/4.184)||0),
          p:Math.round(p.nutriments['proteins_100g']||0),
          c:Math.round(p.nutriments['carbohydrates_100g']||0),
          f:Math.round(p.nutriments['fat_100g']||0),
          fiber:Math.round((p.nutriments['fiber_100g']||0)*10)/10,
          sugars:Math.round((p.nutriments['sugars_100g']||0)*10)/10,
          sodium:Math.round((p.nutriments['sodium_100g']||0)*1000),
          sat_fat:Math.round((p.nutriments['saturated-fat_100g']||0)*10)/10
        };
      });
  };
  var apiResults=[];
  try{
    const qs='&search_simple=1&action=process&json=1&page_size=20&fields=product_name,brands,nutriments';
    const r1=await fetch('https://au.openfoodfacts.org/cgi/search.pl?search_terms='+encodeURIComponent(q)+qs);
    const d1=await r1.json();
    apiResults=parseProds(d1.products||[]);
    if(apiResults.length<5){
      // Not enough AU hits — pull world results too
      const r2=await fetch('https://world.openfoodfacts.org/cgi/search.pl?search_terms='+encodeURIComponent(q)+qs);
      const d2=await r2.json();
      var worldHits=parseProds(d2.products||[]);
      var auNames=new Set(apiResults.map(function(x){return x.name.toLowerCase();}));
      apiResults=[...apiResults,...worldHits.filter(function(x){return!auNames.has(x.name.toLowerCase());})].slice(0,15);
    }
  }catch(e){apiResults=[];}

  // ── Step 4: Merge — memory → local DB → API, deduplicated ────────────────
  var memFinal=getMemoryResults(S.foodQuery);
  var finalSeen=new Set(memFinal.map(function(x){return x.name.toLowerCase();}));
  var localFinal=popularHits.filter(function(x){return!finalSeen.has(x.name.toLowerCase());}).slice(0,4);
  localFinal.forEach(function(x){finalSeen.add(x.name.toLowerCase());});
  var apiFinal=apiResults.filter(function(x){return!finalSeen.has(x.name.toLowerCase());});

  S.foodResults=[...memFinal,...localFinal,...apiFinal];

  // Last resort fallback
  if(S.foodResults.length===0){
    const qf=q.toLowerCase();
    S.foodResults=POPULAR_FOODS_DB.filter(function(item){
      return item.name.toLowerCase().includes(qf)||qf.split(' ').some(function(w){return w.length>2&&item.name.toLowerCase().includes(w);});
    });
  }
  S.foodSearching=false;
  refreshFoodResults();
}
function selectFood(idx){
  var food=S.foodResults[idx];if(!food)return;
  var hr=new Date().getHours();
  var defaultMeal=hr<11?'breakfast':hr<15?'lunch':hr<18?'snack':'dinner';
  S.pendingFood={...food,servingQty:food.servingG||100,meal:defaultMeal};
  render();
}

function updateFoodQty(val){
  var qty=parseInt(val);
  if(!S.pendingFood)return;
  // Don’t snap the field to 100 while user is typing — only update if valid
  if(!qty||qty<1) return;
  S.pendingFood.servingQty=qty;
  var scale=qty/100;
  var f=S.pendingFood;
  var elCal=document.getElementById('fq-cal');
  var elP=document.getElementById('fq-p');
  var elC=document.getElementById('fq-c');
  var elF=document.getElementById('fq-f');
  var elFiber=document.getElementById('fq-fiber');
  var elSugars=document.getElementById('fq-sugars');
  var elSodium=document.getElementById('fq-sodium');
  var elSatFat=document.getElementById('fq-satfat');
  if(elCal)elCal.textContent=Math.round(f.cal*scale);
  if(elP)elP.textContent=Math.round(f.p*scale)+'g';
  if(elC)elC.textContent=Math.round(f.c*scale)+'g';
  if(elF)elF.textContent=Math.round(f.f*scale)+'g';
  if(elFiber)elFiber.textContent=Math.round((f.fiber||0)*scale*10)/10+'g';
  if(elSugars)elSugars.textContent=Math.round((f.sugars||0)*scale*10)/10+'g';
  if(elSodium)elSodium.textContent=Math.round((f.sodium||0)*scale)+'mg';
  if(elSatFat)elSatFat.textContent=Math.round((f.sat_fat||0)*scale*10)/10+'g';
}
function renderServingBtns(food){
  var sg=food.servingG;
  var cur=food.servingQty||sg||100;
  var out='';
  if(sg){
    [[0.5,'1/2'],[1,'1'],[1.5,'1.5'],[2,'2']].forEach(function(pair){
      var x=pair[0],lbl=pair[1];
      var g=Math.round(sg*x);
      var act=cur===g;
      out+='<button onclick="updateFoodQty('+g+')" style="padding:6px 10px;background:'+(act?'var(--green)':'var(--s3)')+';border:1px solid '+(act?'var(--green)':'var(--border)')+';border-radius:8px;color:'+(act?'#fff':'var(--muted)')+';font-size:0.72rem;font-weight:700;cursor:pointer">'+lbl+' serve'+(x!==1?'s':'')+' ('+g+'g)</button>';
    });
    out+='<button onclick="updateFoodQty(100)" style="padding:6px 10px;background:'+(cur===100?'var(--blue)':'var(--s3)')+';border:1px solid '+(cur===100?'var(--blue)':'var(--border)')+';border-radius:8px;color:'+(cur===100?'#fff':'var(--muted)')+';font-size:0.72rem;font-weight:700;cursor:pointer">100g</button>';
  } else {
    [50,100,150,200].forEach(function(g){
      var act=cur===g;
      out+='<button onclick="updateFoodQty('+g+')" style="padding:6px 10px;background:'+(act?'var(--green)':'var(--s3)')+';border:1px solid '+(act?'var(--green)':'var(--border)')+';border-radius:8px;color:'+(act?'#fff':'var(--muted)')+';font-size:0.72rem;font-weight:700;cursor:pointer">'+g+'g</button>';
    });
  }
  return out;
}


function startBarcodeInput(){
  // Use html5-qrcode — works on iOS Safari + Android Chrome
  function launchScanner(){
    // Build fullscreen overlay
    var overlay=document.createElement('div');
    overlay.id='barcode-overlay';
    overlay.style.cssText='position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0';
    overlay.innerHTML=
      '<div style="color:#fff;font-size:1rem;font-weight:700;padding:16px;letter-spacing:.05em;text-align:center">📷 Point at a barcode</div>'+
      '<div id="qr-reader" style="width:100%;max-width:400px;flex:1;max-height:60vh"></div>'+
      '<div id="bc-status" style="color:#1D9E75;font-size:0.82rem;padding:10px;text-align:center">Hold 15–20cm away · keep steady</div>'+
      '<div style="display:flex;gap:12px;padding:16px;width:100%;max-width:400px">'+
        '<button id="bc-cancel" style="flex:1;background:none;border:2px solid #555;border-radius:12px;color:#fff;padding:14px;font-size:0.95rem;cursor:pointer">Cancel</button>'+
        '<button id="bc-manual" style="flex:1;background:#1D9E75;border:none;border-radius:12px;color:#fff;padding:14px;font-size:0.9rem;font-weight:700;cursor:pointer">Type Number</button>'+
      '</div>';
    document.body.appendChild(overlay);

    var scanner=null;
    function stopAll(){
      if(scanner){try{scanner.stop().catch(function(){});}catch(e){}}
      if(overlay.parentNode) overlay.parentNode.removeChild(overlay);
    }
    document.getElementById('bc-cancel').onclick=stopAll;
    document.getElementById('bc-manual').onclick=function(){
      stopAll();
      var num=prompt('Enter barcode number:');
      if(num&&num.trim()){S.foodQuery=num.trim();doFoodSearch();}
    };

    try{
      scanner=new Html5Qrcode('qr-reader');
      scanner.start(
        {facingMode:{exact:'environment'}},
        {fps:12,qrbox:{width:220,height:120},aspectRatio:1.777},
        function(code){
          stopAll();
          S.foodQuery=code;
          doFoodSearch();
        },
        function(err){}  // ignore per-frame errors
      ).then(function(){
        // Apply continuous autofocus for older iPhones that can't focus close
        try{
          var vid=document.querySelector('#qr-reader video');
          if(vid&&vid.srcObject){
            var track=vid.srcObject.getVideoTracks()[0];
            if(track&&track.applyConstraints){
              track.applyConstraints({advanced:[{focusMode:'continuous'},{zoom:1.0}]}).catch(function(){});
            }
          }
        }catch(e){}
        var st=document.getElementById('bc-status');
        if(st)st.textContent='Hold 15–20cm away · keep steady';
      }).catch(function(err){
        // Exact environment may fail on some devices — retry without exact
        try{
          scanner.start(
            {facingMode:'environment'},
            {fps:12,qrbox:{width:220,height:120},aspectRatio:1.777},
            function(code){stopAll();S.foodQuery=code;doFoodSearch();},
            function(err){}
          ).catch(function(){
            stopAll();
            var num=prompt('Camera access denied. Enter barcode number:');
            if(num&&num.trim()){S.foodQuery=num.trim();doFoodSearch();}
          });
        }catch(e2){
          stopAll();
          var num=prompt('Camera access denied. Enter barcode number:');
          if(num&&num.trim()){S.foodQuery=num.trim();doFoodSearch();}
        }
      });
    }catch(e){
      stopAll();
      var num2=prompt('Scanner error. Enter barcode number:');
      if(num2&&num2.trim()){S.foodQuery=num2.trim();doFoodSearch();}
    }
  }

  // Load html5-qrcode dynamically on first use
  if(typeof Html5Qrcode!=='undefined'){
    launchScanner();
  } else {
    var scr=document.createElement('script');
    scr.src='https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
    scr.onload=function(){launchScanner();};
    scr.onerror=function(){
      var num=prompt('Enter barcode number from the product:');
      if(num&&num.trim()){S.foodQuery=num.trim();doFoodSearch();}
    };
    document.head.appendChild(scr);
  }
}

function confirmAddFood(){
  if(!S.pendingFood)return;
  const f=S.pendingFood;
  const qty=f.servingQty||100;
  const scale=qty/100;
  S.foodLog.push({
    id:Date.now().toString(),
    date:S.logDate||todayStr(),
    meal:f.meal||'untagged',
    name:f.name,
    brand:f.brand||'',
    qty,
    cal:Math.round(f.cal*scale),
    p:Math.round(f.p*scale),
    c:Math.round(f.c*scale),
    f:Math.round(f.f*scale),
    fiber:Math.round((f.fiber||0)*scale*10)/10,
    sugars:Math.round((f.sugars||0)*scale*10)/10,
    sodium:Math.round((f.sodium||0)*scale),
    sat_fat:Math.round((f.sat_fat||0)*scale*10)/10
  });
  saveDailyState();
  // ── Save to food memory ──
  saveFoodMemory(f);
  S.showFoodPanel=false;S.pendingFood=null;S.foodResults=[];
  render();
}

function saveFoodMemory(food){
  if(!food||!food.name) return;
  var mem=S.foodMemory;
  // Index under every meaningful word in name + brand
  var words=((food.name||'')+' '+(food.brand||'')).toLowerCase()
    .replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(w=>w.length>2);
  // Also index under the full name normalised
  var fullKey=(food.name||'').toLowerCase().trim();
  var keys=[...new Set([fullKey,...words])];
  var entry={
    name:food.name,brand:food.brand||'',
    cal:food.cal,p:food.p,c:food.c,f:food.f,
    fiber:food.fiber||0,sugars:food.sugars||0,sodium:food.sodium||0,sat_fat:food.sat_fat||0,
    servingG:food.servingQty||food.servingG||100,
    lastUsed:Date.now()
  };
  keys.forEach(function(k){
    if(!k) return;
    if(!mem[k]) mem[k]=[];
    // Remove existing entry for same food name+brand, re-add updated
    mem[k]=mem[k].filter(function(e){return !(e.name===food.name&&e.brand===(food.brand||''));});
    entry.useCount=(mem[k].find(function(e){return e.name===food.name;})||{useCount:0}).useCount+1;
    mem[k].unshift(entry);
    // Keep max 8 per key
    if(mem[k].length>8) mem[k]=mem[k].slice(0,8);
  });
  S.foodMemory=mem;
}

function getMemoryResults(query){
  var q=(query||'').toLowerCase().trim();
  if(!q) return [];
  var mem=S.foodMemory;
  var seen={};var out=[];
  var words=q.split(/\s+/).filter(function(w){return w.length>=2;});

  // 1. Exact key match
  if(mem[q]) mem[q].forEach(function(e){
    var k=e.name+'__'+(e.brand||'');
    if(!seen[k]){seen[k]=true;out.push(Object.assign({},e,{_memory:true}));}
  });

  // 2. Word key matches (e.g. "ham" matches key "ham")
  words.forEach(function(w){
    if(mem[w]) mem[w].forEach(function(e){
      var k=e.name+'__'+(e.brand||'');
      if(!seen[k]){seen[k]=true;out.push(Object.assign({},e,{_memory:true}));}
    });
  });

  // 3. Substring scan across ALL memory keys (catches "chicken breast" from key "chicken")
  Object.keys(mem).forEach(function(key){
    var keyMatches=words.some(function(w){return key.includes(w)||w.includes(key);});
    if(!keyMatches) return;
    mem[key].forEach(function(e){
      var k=e.name+'__'+(e.brand||'');
      if(!seen[k]){
        // Extra check: food name itself must contain the query word
        var nameMatch=words.some(function(w){return (e.name||'').toLowerCase().includes(w)||(e.brand||'').toLowerCase().includes(w);});
        if(nameMatch){seen[k]=true;out.push(Object.assign({},e,{_memory:true}));}
      }
    });
  });

  out.sort(function(a,b){return (b.lastUsed||0)-(a.lastUsed||0);});
  return out.slice(0,6);
}

function removeFoodLog(id){
  var row=document.getElementById('fli-'+id);
  if(row){
    row.style.transition='opacity .25s,transform .25s';
    row.style.opacity='0';
    row.style.transform='translateX(-100%)';
    setTimeout(function(){
      S.foodLog=S.foodLog.filter(f=>f.id!==id);
      saveDailyState();render();
    },220);
  } else {
    S.foodLog=S.foodLog.filter(f=>f.id!==id);
    saveDailyState();render();
  }
}

// ── Swipe-to-delete food log rows — velocity-based, no red background ──
var _sw={};
function swipeStart(e,id){
  var t=e.touches[0];
  _sw[id]={x:t.clientX,y:t.clientY,t:Date.now(),dx:0,locked:false,dead:false};
}
function swipeMove(e,id){
  var s=_sw[id];if(!s||s.dead)return;
  var t=e.touches[0];
  var dx=t.clientX-s.x;
  var dy=t.clientY-s.y;
  // Lock to vertical scroll if that's the dominant direction early on
  if(!s.locked&&Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>10){s.dead=true;return;}
  if(dx>=0)return; // only left
  s.locked=true;
  s.dx=dx;
  e.preventDefault();
  var el=document.getElementById('fli-inner-'+id);
  if(el){
    // Follow finger with slight resistance
    var tx=Math.max(dx*0.85,-160);
    el.style.transition='none';
    el.style.transform='translateX('+tx+'px)';
    el.style.opacity=Math.max(0.3,1+tx/200);
  }
}
function swipeEnd(e,id){
  var s=_sw[id];if(!s){return;}
  var dx=s.dx||0;
  var dt=Date.now()-s.t;
  var velocity=Math.abs(dx)/Math.max(dt,1)*1000; // px/s
  delete _sw[id];
  var el=document.getElementById('fli-inner-'+id);
  // Dismiss if: fast swipe (>400px/s) OR dragged far enough (>110px)
  if(velocity>400||dx<-110){
    if(el){
      el.style.transition='transform .2s cubic-bezier(.4,0,1,1),opacity .2s';
      el.style.transform='translateX(-110%)';
      el.style.opacity='0';
    }
    haptic([15,8,25]);
    setTimeout(function(){removeFoodLog(id);},200);
  } else {
    // Snap back
    if(el){
      el.style.transition='transform .25s cubic-bezier(.22,1,.36,1),opacity .25s';
      el.style.transform='translateX(0)';
      el.style.opacity='1';
    }
  }
}

function renderCheckin(){
  const c=S.checkin;
  const weekNum=S.checkinWeekOverride||(S.week||1);

  function ratingBtns(field,max,colorFn){
    return Array.from({length:max},(_,i)=>{
      const v=i+1;
      const selClass=colorFn?colorFn(v):'sel';
      return '<button class="rating-btn'+(c[field]===v?' '+selClass:'')+'" onclick="S.checkin.'+field+'='+v+';render()">'+v+'</button>';
    }).join('');
  }
  function pillBtns(field,max){
    return Array.from({length:max+1},(_,i)=>'<button class="rating-btn'+(c[field]===i?' sel':'')+'" onclick="S.checkin.'+field+'='+i+';render()">'+i+'</button>').join('');
  }

  }
  // Pull exercise notes from sessions this week
  const weekNotes=(function(){
    var n=[];
    var cutoff=new Date();cutoff.setDate(cutoff.getDate()-7);
    (S.gymHistory||[]).forEach(function(h){
      if(!h.notes||new Date(h.date)<cutoff) return;
      var dayName=(WK[h.day]&&WK[h.day].name)||('Day '+h.day);
      Object.entries(h.notes).forEach(function(e){
        if(e[1]&&e[1].trim()){
          var exN=(WK[h.day]&&WK[h.day].exercises||[]).find(function(x){return x.id===e[0];});
          n.push({day:dayName,ex:(exN&&exN.name)||e[0],note:e[1],date:h.date});
        }
      });
    });
    return n;
  })();

  return '<div class="checkin-overlay">'+
  '<div class="checkin-header">'+
    '<div>'+
      '<div style="font-size:1.05rem;font-weight:800">Weekly Check-in</div>'+
      '<div style="font-size:0.72rem;color:var(--muted)">Week '+weekNum+' &middot; '+new Date().toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'short'})+'</div>'+
    '</div>'+
    '<button onclick="closeCheckin()" style="background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:6px 12px;cursor:pointer;font-size:0.85rem">&#x2715; Close</button>'+
  '</div>'+

  // RECOVERY
  '<div class="checkin-section">'+
    '<div class="checkin-section-title">&#x1F4A4; Recovery</div>'+
    '<div class="wizard-label" style="margin-bottom:6px">Average sleep this week <span style="color:var(--green);font-weight:700">'+c.sleepHrs+' hrs</span></div>'+

function getSwapFor(exId,injuryText){
  var txt=(injuryText||'').toLowerCase();
  var opts=SWAP_LIBRARY[exId];
  if(!opts||!opts.length) return null;
  // Score each option by keyword matches
  var best=null,bestScore=0;
  opts.forEach(function(opt){
    var score=opt.keys.filter(function(k){return txt.indexOf(k)>-1;}).length;
    if(score>bestScore){bestScore=score;best=opt.ex;}
  });
  return bestScore>0?best:opts[0].ex; // fallback to first option if any injury text present
}

// ─── RULE-BASED ADJUSTMENTS ───────────────────────────────────────────────────
function getRuleAdjustments(c){
  var log=[];
  var ov={swaps:{},injuryNotes:{},volumeFactor:1.0,loadFactor:1.0};

  // Deload trigger: energy ≤3 OR soreness ≥8 + energy ≤5
  if(c.energy<=3){
    ov.loadFactor=0.6;ov.volumeFactor=0.75;
    log.push({e:'⚡',t:'DELOAD triggered — energy was '+c.energy+'/10. All loads dropped 40%, volume cut 25% for the coming week.'});
  } else if(c.soreness>=8&&c.energy<=5){
    ov.loadFactor=0.8;ov.volumeFactor=0.8;
    log.push({e:'⚡',t:'Recovery week: soreness '+c.soreness+'/10 + energy '+c.energy+'/10. Loads at 80%, volume cut 20%.'});
  } else if(c.energy<=5){
    ov.volumeFactor=0.85;
    log.push({e:'⬇️',t:'Volume trimmed 15% — energy was only '+c.energy+'/10 this week.'});
  }

  // High stress
  if(c.stressLevel>=8&&ov.volumeFactor===1.0){
    ov.volumeFactor=0.85;
    log.push({e:'\u{1f9e0}',t:'Stress load is high ('+c.stressLevel+'/10) — volume dialled back 15%.'});
  }

  // Low sessions — flag only
  if(c.sessionsCompleted<=1){
    log.push({e:'\u{1f4cb}',t:'Only '+c.sessionsCompleted+' session logged. If life is busy, we can simplify the split — ask your coach.'});
  }

  // PRs logged — note for next session
  if(c.prs&&c.prs.trim()){
    log.push({e:'\u{1f3c6}',t:'PRs logged ('+c.prs.trim()+') — load progression accelerated for those lifts next session.'});
  }

  return {ov:ov,log:log};
}

// ─── COACH ADJUSTMENT ENGINE ──────────────────────────────────────────────────
function applyCheckinAdjustments(checkinData,reviewText){
  var rule=getRuleAdjustments(checkinData);
  var ov=rule.ov;
  var log=rule.log;

  // Build injury context from notes + wentWell/toImprove
  var injuryText='';
  var noteFields=['sleep','soreness','energy','sessions','overload','sets','protein','calories','meals','stress','hydration'];
  noteFields.forEach(function(f){var v=checkinData['notes_'+f];if(v&&v.trim())injuryText+=' '+v;});
  if(checkinData.wentWell) injuryText+=' '+checkinData.wentWell;
  if(checkinData.toImprove) injuryText+=' '+checkinData.toImprove;
  injuryText=injuryText.toLowerCase();

  // Apply SWAP_LIBRARY matches for any injury keywords found
  var injuryKeywords=['pain','pinch','tight','stiff','sore','tweak','hurt','strain','ache','uncomfortable','discomfort','injury','injured','aggravate'];
  var hasInjuryMention=injuryKeywords.some(function(k){return injuryText.indexOf(k)>-1;});

  if(hasInjuryMention){
    Object.keys(SWAP_LIBRARY).forEach(function(exId){
      var swap=getSwapFor(exId,injuryText);
      if(swap){
        // Find which day(s) this exercise appears in
        Object.entries(WK).forEach(function(entry){
          var dayId=entry[0];var dayData=entry[1];
          if(dayData.exercises.some(function(e){return e.id===exId;})){
            if(!ov.swaps[dayId]) ov.swaps[dayId]={};
            ov.swaps[dayId][exId]=swap;
            log.push({e:'✏️',t:dayData.exercises.find(function(e){return e.id===exId;}).name+' → '+swap.name+' (pain/discomfort flagged in check-in notes)'});
            if(!ov.injuryNotes) ov.injuryNotes={};
            ov.injuryNotes[exId]='⚠️ Coach flagged: check notes from Week '+(S.week||1)+' check-in';
          }
        });
      }
    });
  }

  // Now make an AI call for nuanced structured adjustments
  var prompt='Based on this weekly check-in, return ONLY a valid JSON object (no markdown, no explanation).\n\n'
    +'CHECK-IN DATA:\n'
    +'Energy: '+checkinData.energy+'/10 | Sleep: '+checkinData.sleepHrs+'hrs | Soreness: '+checkinData.soreness+'/10\n'
    +'Stress: '+checkinData.stressLevel+'/10 | Sessions: '+checkinData.sessionsCompleted+' | PRs: '+(checkinData.prs||'none')+'\n'
    +'Overload achieved: '+checkinData.overloadAchieved+' | Sets missed: '+checkinData.setsMissed+'\n'
    +'Notes from athlete: '+injuryText.substring(0,400)+'\n\n'
    +'AVAILABLE EXERCISE IDs: '+Object.values(WK).flatMap(function(d){return d.exercises.map(function(e){return e.id;});}).join(', ')+'\n\n'
    +'Return ONLY this JSON structure (fill arrays with 0-3 items based on what is genuinely warranted — empty arrays if nothing needed):\n'
    +'{"ai_log":["short coach message about a specific adjustment"],"injury_flags":{"exerciseId":"brief warning for athlete"},"load_note":"one sentence on intensity for next week or empty string"}\n'
    +'Exercise IDs must match the available list exactly. Be conservative — only flag real issues.';

  fetch(FITOS_WORKER_URL,{
    method:'POST',
    headers:{'content-type':'application/json'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:400,system:'You are a precise fitness coaching assistant. Return only valid JSON as instructed.',messages:[{role:'user',content:prompt}]})
  }).then(function(r){return r.json();}).then(function(data){
    if(data.content&&data.content[0]&&data.content[0].text){
      try{
        var txt=data.content[0].text.trim().replace(/^```[a-z]*\n?/,'').replace(/```$/,'');
        var ai=JSON.parse(txt);
        if(ai.ai_log&&Array.isArray(ai.ai_log)) ai.ai_log.forEach(function(msg){if(msg&&msg.trim())log.push({e:'\u{1f916}',t:msg.trim()});});
        if(ai.injury_flags){Object.assign(ov.injuryNotes=ov.injuryNotes||{},ai.injury_flags);}
        if(ai.load_note&&ai.load_note.trim()) log.push({e:'\u{1f3af}',t:ai.load_note.trim()});
      }catch(e){}
    }
    // Save final overrides
    ov.weekApplied=S.week||1;
    ov.expiresWeek=(S.week||1)+1;
    ov.adjustmentLog=log;
    S.programOverrides=ov;
    localStorage.setItem('fitos_prog_overrides',JSON.stringify(ov));
    render();
  }).catch(function(){
    // Save rule-based overrides even if AI call fails
    ov.weekApplied=S.week||1;
    ov.expiresWeek=(S.week||1)+1;
    ov.adjustmentLog=log;
    S.programOverrides=ov;
    localStorage.setItem('fitos_prog_overrides',JSON.stringify(ov));
    render();
  });
}

function generateCheckinReview(){
  const c=S.checkin;
  const p=S.profile;
  const weekNum=S.week||1;

  // Build notes summary from all note fields
  var notesLines=[];
  var noteFields=[
    ['sleep','Sleep reason'],['soreness','Soreness detail'],['energy','Energy detail'],
    ['sessions','Session notes'],['overload','Overload detail'],['sets','Sets missed reason'],
    ['protein','Protein notes'],['calories','Calorie tracking notes'],['meals','Meal adherence notes'],
    ['stress','Stress detail'],['hydration','Hydration notes']
  ];
  noteFields.forEach(function(pair){
    var val=c['notes_'+pair[0]];
    if(val&&val.trim()) notesLines.push(pair[1]+': '+val.trim());
  });

  // Build gym history for this week
  var weekLines=[];
  var cutoff=new Date();cutoff.setDate(cutoff.getDate()-7);
  var weekSessions=(S.gymHistory||[]).filter(function(h){return new Date(h.date)>=cutoff;});
  weekSessions.forEach(function(h){
    weekLines.push('Day '+h.day+' (W'+h.week+') — '+new Date(h.date).toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'}));
    Object.entries(h.sets||{}).forEach(function(entry){
      var exId=entry[0]; var sets=entry[1];
      if(!sets||!sets.length) return;
      var exName=exId;
      Object.values(WK||{}).forEach(function(day){if(day&&day.exercises)day.exercises.forEach(function(e){if(e.id===exId)exName=e.name;});});
      var setStr=sets.filter(Boolean).map(function(s){return s.weight+'kg\xd7'+s.reps;}).join(', ');
      weekLines.push('  • '+exName+': '+setStr);
    });
    if(h.notes){Object.entries(h.notes).forEach(function(e){if(e[1]&&e[1].trim()){var exN=null;Object.values(WK||{}).forEach(function(d){if(d&&d.exercises)d.exercises.forEach(function(ex){if(ex.id===e[0])exN=ex.name;});});if(exN)weekLines.push('  [Note on '+exN+']: '+e[1]);}});}
  });

  var prompt='You are FitOS AI Coach, an elite Australian personal trainer. Give a sharp, direct, warm weekly review.\n\n'+
    'ATHLETE: '+(p.name||'Athlete')+' | '+(p.age||'?')+'yr '+p.gender+' | '+(p.height||'?')+'cm / '+(p.weight||'?')+'kg\n'+
    'GOAL: '+p.goal+' | LEVEL: '+p.experience+' | '+p.daysPerWeek+' days/wk\n'+
    'INJURIES: '+(p.injuries&&p.injuries.length?p.injuries.join(', '):'None')+'\n'+
    'CHECK-IN WEIGHT: '+(c.bodyWeight?c.bodyWeight+'kg'+(c.waist?' | Waist: '+c.waist+'cm':''):'Not logged')+'\n\n'+
    'RECOVERY\nSleep: '+c.sleepHrs+' hrs | Soreness: '+c.soreness+'/10 | Energy: '+c.energy+'/10\n\n'+
    'TRAINING\nSessions: '+c.sessionsCompleted+' | Overload: '+(c.overloadAchieved||'?')+' | Sets missed: '+(c.setsMissed||'?')+'\n'+(c.prs?'PRs: '+c.prs+'\n':'')+'\n'+
    'NUTRITION\nProtein days: '+c.proteinDays+'/7 | Calorie tracking: '+c.calorieDays+'/7 | Meal adherence: '+(c.mealAdherence||'?')+'\n\n'+
    'LIFESTYLE\nStress: '+c.stressLevel+'/10 | Water: '+c.hydrationGlasses+'L/day\n\n'+
    'REFLECTION\nWent well: '+(c.wentWell||'Nothing noted')+'\nTo improve: '+(c.toImprove||'Nothing noted')+'\n\n'+
    (notesLines.length?'ATHLETE NOTES (read carefully — explains the WHY behind each rating):\n'+notesLines.join('\n')+'\n\n':'')+
    (weekLines.length?'LOGGED SETS THIS WEEK:\n'+weekLines.join('\n')+'\n\n':'')+
    'Write a review with these exact sections:\n'+
    '🏆 WEEK SUMMARY (2-3 sentences, be real about where they are)\n'+
    '✅ WHAT\'S WORKING (2-3 specific bullet points)\n'+
    '⚠️ WATCH POINTS (1-2 flags, be specific not generic)\n'+
    '🎯 NEXT WEEK FOCUS (1 clear priority they can action immediately)\n'+
    '💪 TRAINING CALL (specific load, volume, or intensity tweak)\n'+
    '🥗 NUTRITION CALL (one specific nutrition action)\n\n'+
    'Tone: direct, Australian, a bit of humour, science-backed. No waffle. Max 400 words.';

  S.checkinReviewLoading=true;
  S.checkinReview=null;
  render();

  // Save snapshot to history
  if(c.bodyWeight){
    var snap={week:weekNum,date:new Date().toISOString().slice(0,10),weight:parseFloat(c.bodyWeight),waist:parseFloat(c.waist)||null,prs:c.prs,energy:c.energy,sleep:c.sleepHrs};
    S.checkinHistory=S.checkinHistory.filter(function(h){return h.week!==weekNum;});
    S.checkinHistory.push(snap);
    S.checkinHistory.sort(function(a,b){return a.week-b.week;});
    if(S.checkinHistory.length>16) S.checkinHistory=S.checkinHistory.slice(-16);
    localStorage.setItem('fitos_checkin_history',JSON.stringify(S.checkinHistory));
    if(weekNum>=S.week) S.week=weekNum+1;
    localStorage.setItem('fitos_week',S.week);
    localStorage.setItem('fitos_macro_block',String(S.macroBlock||1));
  }
  localStorage.setItem('fitos_checkin_draft',JSON.stringify(c));

  fetch(FITOS_WORKER_URL,{
    method:'POST',
    headers:{'content-type':'application/json'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1200,system:buildCoachSystemPrompt(),messages:[{role:'user',content:prompt}]})
  }).then(function(r){return r.json();}).then(function(data){
    S.checkinReviewLoading=false;
    if(data.content&&data.content[0]&&data.content[0].text){
      S.checkinReview=data.content[0].text;
      applyCheckinAdjustments(c,S.checkinReview);
    } else {
      S.checkinReview='Hmm, something went wrong getting your review. Check your internet and try again.';
    }
    render();
    setTimeout(function(){
      var el=document.querySelector('[onclick="S.checkinReview=null;render()"]');
      if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
    },150);
  }).catch(function(err){
    S.checkinReviewLoading=false;
    S.checkinReview='Connection error: '+err.message+'. Check your internet and try again.';
    render();
  });
}

// ── ADD EXERCISE MID-WORKOUT ─────────────────────────────────────────────────
function getAddExOptions(){
  var exs=getSessionExercises();
  var usedIds=new Set(exs.map(function(e){return e.id;}));
  var available=getAvailable(S.profile||{});
  // Get patterns from current day's exercises via EL lookup
  var dayPats=new Set();
  exs.forEach(function(e){
    var found=EL.find(function(el){return el.id===e.id;});
    if(found) dayPats.add(found.p);
  });
  // Expand to related patterns (push-h also unlocks iso-push etc.)
  var expand={'push-h':['push-inc','push-v','iso-push'],'push-inc':['push-h','push-v','iso-push'],
    'push-v':['push-h','push-inc','iso-push'],'iso-push':['push-h','push-inc'],
    'pull-h':['pull-v','iso-pull'],'pull-v':['pull-h','iso-pull'],'iso-pull':['pull-h','pull-v'],
    'squat':['lunge','iso-lower'],'lunge':['squat','iso-lower'],'hinge':['iso-lower'],
    'iso-lower':['squat','lunge','hinge'],'core':[],'cond':[]};
  var expanded=new Set(dayPats);
  dayPats.forEach(function(p){(expand[p]||[]).forEach(function(r){expanded.add(r);});});
  expanded.add('core');
  // If still empty, infer from day tag
  if(expanded.size<=1){
    var day=getWorkoutDay(S.day);
    var tag=(day&&day.tag||'').toLowerCase();
    var nm=(day&&day.name||'').toLowerCase();
    if(tag.includes('quad')||tag.includes('squat')||tag.includes('leg')||nm.includes('leg')||nm.includes('lower'))
      {expanded.add('squat');expanded.add('lunge');expanded.add('iso-lower');}
    if(tag.includes('ham')||tag.includes('hinge')||tag.includes('posterior')||nm.includes('hinge'))
      {expanded.add('hinge');expanded.add('iso-lower');}
    if(tag.includes('chest')||tag.includes('shoulder')||tag.includes('delt')||tag.includes('push')||nm.includes('push'))
      {expanded.add('push-h');expanded.add('push-inc');expanded.add('push-v');expanded.add('iso-push');}
    if(tag.includes('back')||tag.includes('bicep')||tag.includes('pull')||nm.includes('pull'))
      {expanded.add('pull-v');expanded.add('pull-h');expanded.add('iso-pull');}
  }
  return available.filter(function(ex){return expanded.has(ex.p)&&!usedIds.has(ex.id);});
}

function addExerciseToSession(exId){

    id:found.id,name:found.n,
    type:found.p.includes('iso')?'Isolation':found.p==='core'?'Core':'Compound',
    sets:ws.s||found.s||3,lo:ws.lo||found.lo||8,hi:ws.hi||found.hi||12,rest:ws.r||found.r||90,
    muscles:(found.pm||[]).concat(found.sm||[]),cue:found.cue||'Focus on form and full range of motion.',
    anim:found.anim||null,yt:found.yt||'',_added:true
  };
  if(!S.addedExercises) S.addedExercises={};
  if(!S.addedExercises[S.day]) S.addedExercises[S.day]=[];
  S.addedExercises[S.day].push(ex);

  render();window.scrollTo(0,0);
}

    }).join('');
    return '<div style="font-size:0.68rem;font-weight:700;color:var(--muted);letter-spacing:0.1em;padding:10px 16px 2px;text-transform:uppercase;background:var(--s3)">'+label+'</div>'+items;
  }).join('');
  if(!groupHtml) groupHtml='<div style="padding:32px;text-align:center;color:var(--muted);font-size:0.85rem">No exercises left for this day&apos;s training focus</div>';
  return '<div onclick="if(event.target===this){S.showAddExSheet=false;render();}" '+

    '<div style="background:var(--s2);border-radius:18px 18px 0 0;width:100%;max-width:600px;max-height:78vh;overflow-y:auto;border-top:1px solid var(--border)">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--s2)">'+
        '<div>'+
          '<div style="font-size:1rem;font-weight:800">Add Exercise</div>'+
          '<div style="font-size:0.72rem;color:var(--muted);margin-top:2px">Matched to today&apos;s training focus</div>'+
        '</div>'+
        '<button onclick="S.showAddExSheet=false;render()" '+
          'style="background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text);font-size:0.8rem;cursor:pointer">✕</button>'+
      '</div>'+

}

function editSet(exId,idx){S.editingSet={exId:exId,idx:idx};render();}
var _ssd={};
function swipeSetStart(e,exId,i){
  var t=e.touches[0];
  _ssd[exId+'-'+i]={x:t.clientX,y:t.clientY,t:Date.now(),dx:0,dead:false,locked:false};
}
function swipeSetMove(e,exId,i){
  var key=exId+'-'+i;
  var d=_ssd[key];if(!d||d.dead)return;
  var t=e.touches[0];
  var dx=t.clientX-d.x;
  var dy=t.clientY-d.y;
  if(!d.locked&&Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>10){d.dead=true;return;}
  if(dx>=0)return;
  d.locked=true;
  d.dx=dx;
  e.preventDefault();
  var el=document.getElementById('ssi-'+exId+'-'+i);
  if(el){
    var tx=Math.max(dx*0.85,-110);
    el.style.transition='none';
    el.style.transform='translateX('+tx+'px)';
    el.style.opacity=Math.max(0.3,1+tx/180);
  }
}
function swipeSetEnd(e,exId,i,isExtra){
  var key=exId+'-'+i;
  var d=_ssd[key];if(!d)return;
  var dx=d.dx||0;
  var dt=Date.now()-d.t;
  var velocity=Math.abs(dx)/Math.max(dt,1)*1000;
  delete _ssd[key];
  var el=document.getElementById('ssi-'+exId+'-'+i);
  if(velocity>400||dx<-90){
    if(el){
      el.style.transition='transform .2s cubic-bezier(.4,0,1,1),opacity .2s';
      el.style.transform='translateX(-110%)';
      el.style.opacity='0';
    }
    haptic([15,8,25]);
    setTimeout(function(){deleteSet(exId,i,isExtra);},200);
  } else {
    if(el){
      el.style.transition='transform .25s cubic-bezier(.22,1,.36,1),opacity .25s';
      el.style.transform='translateX(0)';
      el.style.opacity='1';
    }
  }
}
function deleteSet(exId,idx,isExtra){
  if(S.loggedSets[exId])S.loggedSets[exId].splice(idx,1);
  if(isExtra)S.extraSets[exId]=Math.max(0,(S.extraSets[exId]||0)-1);
  saveLog();render();
}
function saveLog(){
  localStorage.setItem('fitos_logged',JSON.stringify(S.loggedSets));
  localStorage.setItem('fitos_train_state',JSON.stringify({week:S.week,day:S.day,exIdx:S.exIdx,workoutStart:S.workoutStart}));

function abandonWorkout(){

  }
}

function resumeSession(gIdx){

  function ytRelevant(items){
    if(!items||!items.length) return null;
    for(var i=0;i<items.length;i++){
      var t=(items[i].snippet&&items[i].snippet.title||'').toLowerCase();
      if(queryWords.some(function(w){return t.includes(w);})) return items[i];
    }

function launchConfetti(){
  var canvas=document.createElement('canvas');
  canvas.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;';
  document.body.appendChild(canvas);
  var ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  var colors=['#1D9E75','#00E87A','#f5a623','#ff5e57','#64b4ff','#fff','#a78bfa'];
  var ps=[];
  for(var i=0;i<90;i++){
    ps.push({
      x:canvas.width*(0.3+Math.random()*0.4),
      y:canvas.height*0.38,
      vx:(Math.random()-0.5)*14,
      vy:-Math.random()*16-6,
      w:Math.random()*10+4,
      h:Math.random()*5+3,
      color:colors[Math.floor(Math.random()*colors.length)],
      rot:Math.random()*Math.PI*2,
      rs:(Math.random()-0.5)*0.22,
      alpha:1
    });
  }
  var frame=0;
  function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    var alive=false;
    ps.forEach(function(p){
      if(p.alpha<=0)return;
      alive=true;
      p.vy+=0.45;p.x+=p.vx;p.y+=p.vy;p.rot+=p.rs;
      if(frame>45)p.alpha-=0.018;
      ctx.save();
      ctx.globalAlpha=Math.max(0,p.alpha);
      ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.fillStyle=p.color;
      ctx.beginPath();
      if(Math.random()>0.5){ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);}
      else{ctx.arc(0,0,p.w/2,0,Math.PI*2);ctx.fill();}
      ctx.restore();
    });
    frame++;
    if(alive)requestAnimationFrame(tick);else canvas.remove();
  }
  tick();
}

function resetApp(){

  var keys=Object.keys(localStorage).filter(k=>k.startsWith('fitos'));
  keys.forEach(k=>localStorage.removeItem(k));

}

function backupData(){
  var data={};
  Object.keys(localStorage).filter(k=>k.startsWith('fitos')).forEach(k=>{data[k]=localStorage.getItem(k);});
  var json=JSON.stringify(data,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  var d=new Date();
  a.href=url;
  a.download='FitOS_backup_'+d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  alert('Backup saved! Keep this file safe — use it to restore anytime.');
}

function restoreData(){
  var input=document.createElement('input');
  input.type='file';
  input.accept='.json';
  input.onchange=function(e){
    var file=e.target.files[0];
    if(!file) return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        var count=0;
        Object.keys(data).forEach(k=>{
          if(k.startsWith('fitos')){localStorage.setItem(k,data[k]);count++;}
        });
        alert('Restored '+count+' data keys. Reloading now...');
        location.reload();
      }catch(err){
        alert('Could not read backup file. Make sure it is a valid FitOS backup JSON.');
      }
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input);
  input.click();
  document.body.removeChild(input);
}

function toggleStepCounting(){
  if(S.stepTrackingActive){
    window.removeEventListener('devicemotion',onMotion);
    S.stepTrackingActive=false;render();return;
  }
  if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
    DeviceMotionEvent.requestPermission().then(function(r){
      if(r==='granted'){window.addEventListener('devicemotion',onMotion,{passive:true});S.stepTrackingActive=true;render();}
      else{alert('Motion access denied. Set steps manually instead.');}
    }).catch(function(){});
  } else {
    window.addEventListener('devicemotion',onMotion,{passive:true});
    S.stepTrackingActive=true;render();
  }
}

  var inp=document.getElementById('step-manual');

}
